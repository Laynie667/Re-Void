# world/weather_messages.yaml
#
# Message pools for the weather and time-of-day system.
# State names MUST match the canonical sources:
#   weather states — world/weather.py WEATHER_STATES
#     clear, overcast, rain, heavy_rain, fog, storm, snow
#   time periods   — world/gametime.py TIME_PERIODS
#     dawn, morning, afternoon, dusk, evening, midnight
#
# The {time} and {weather} tokens in room/zone descriptions use these same keys.
# Outdoor ambient messages fire into rooms with db.is_outdoor = True.
#
# Edit freely — no code changes needed after editing this file.

# ---------------------------------------------------------------------------
# Time-of-day descriptions — shown by the 'weather' command
# ---------------------------------------------------------------------------

time_desc:
  dawn:      "The sky's going light — the dark bleeding off toward pale grey at the horizon, slow and reluctant about it."
  morning:   "Morning's settled in proper, the light clear and direct and the day well and truly started."
  afternoon: "The afternoon holds onto its warmth, lazy about it, the light starting its long golden slide down the sky."
  dusk:      "The sun's pulling back, the light gone amber and soft at the edges, everything warmer for a little while."
  evening:   "The sky's deepened to dark blue and the first stars have come out to have a look."
  midnight:  "The deep hours. The world's gone quiet and close, and nothing moves that doesn't mean to."

# ---------------------------------------------------------------------------
# Weather state descriptions — shown by the 'weather' command
# ---------------------------------------------------------------------------

weather_desc:
  clear:      "The sky's wide open overhead, clean and bright."
  overcast:   "Cloud's rolled in — a low, even ceiling of pale grey, soft and close."
  rain:       "Rain's falling, fine and steady, settling in to stay a while."
  heavy_rain: "Heavy rain, loud and constant, dragging the far edges of the world out of view."
  storm:      "A storm's moved in — the wind throwing its weight around and the rain coming in sideways."
  fog:        "Fog. It's swallowed the distances whole and left the world close and hushed."
  snow:       "Snow's coming down, slow and even, piling up soft and quiet on everything."

# ---------------------------------------------------------------------------
# Outdoor ambient messages — fired into rooms with db.is_outdoor = True
# Token: {location} (optional)
# ---------------------------------------------------------------------------

outdoor_ambient:

  clear:
    - "The sky's wide open overhead and the light pours down clean and warm."
    - "A breeze drifts through, soft and aimless, just enough to stir the air."
    - "The air's still and clear. A bird calls off somewhere and thinks better of doing it twice."
    - "Open sky, even light, shadows pooling soft and exactly where they belong."

  overcast:
    - "The cloud holds — soft, even light with no shadow to it, the whole world gone gentle and grey."
    - "A grey sky, low and close. Not menacing, just settled in, and the air's gone cool with it."
    - "The clouds have come in and made themselves at home. Everything's quieter underneath them."

  rain:
    - "The rain comes down soft and even, a fine cool weight settling onto every surface."
    - "Light rain, low and constant, whispering against the ground."
    - "A soft rain. The world's gone dark and slick with it, and the air's rich with the smell of wet earth."
    - "The rain keeps its pace, patient and unhurried, in no rush to build or quit."

  heavy_rain:
    - "The rain's hammering down now, dragging everything past a few metres into a grey blur."
    - "Heavy rain, loud as anything, the ground running with it and the air thick and wet."
    - "The downpour shows no mercy and no sign of slowing. Getting anywhere through it takes real want."

  storm:
    - "A gust slams through — the kind that doesn't bother asking first."
    - "Lightning forks somewhere off in the dark, and the thunder comes rolling in a few heartbeats behind it."
    - "The storm hasn't let up an inch. Wind and rain gang up on everything still standing."
    - "The light flares white for a breath — then drops back into the heavy grey-dark of the storm."

  fog:
    - "The fog's eaten the distances whole. What's near you you can see; past that, the world just stops."
    - "The fog sits thick and still, and sound moves through it strange and muffled and close."
    - "In the fog the familiar goes soft and uncertain — shapes and suggestions where solid things used to be."

  snow:
    - "The snow keeps falling, soft and slow, laying itself down over everything alike."
    - "The snow's hushed the whole world. The silence it leaves has a weight you can feel."
    - "Fresh snow on every surface, and more drifting down, unhurried and quiet."
    - "The snowfall's gone and made the light strange — soft and shadowless, glowing up from everywhere at once."

# ---------------------------------------------------------------------------
# Time-of-day outdoor ambient messages
# Layered on top of weather ambients for outdoor rooms
# ---------------------------------------------------------------------------

time_ambient:

  dawn:
    - "The horizon's gone pale and the dark's loosening its hold, grudging about every inch of it."
    - "The first birds have struck up. The light's still soft and unsure of itself."

  morning:
    - "The morning's hit its stride — the light direct, bright, and entirely unbothered."
    - "Full morning now, the day up and running."

  afternoon:
    - "The afternoon light's gone long and golden, warm across everything it touches."
    - "The shadows have stretched themselves out lazy. The day's tipped past its peak."

  dusk:
    - "The horizon's burning down — orange to red to the first creeping dark, putting on a show."
    - "Dusk. The light's nearly spent and the colours have all melted into one warm blur."

  evening:
    - "Evening's settled in soft, the first stars out clear and bright overhead."
    - "Full evening now — the air's cooled, and the sky's gone properly dark straight up."

  midnight:
    - "The night's complete. The stars sit sharp and still, keeping their own counsel."
    - "Nothing stirs. The sky's wheeled on, the stars have drifted, and the long night rolls quietly along."
