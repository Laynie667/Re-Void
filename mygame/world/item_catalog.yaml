# world/item_catalog.yaml
#
# Item catalog for Re:Void.
# Staff spawns items with:
#   @py from world.item_loader import spawn_item; spawn_item(me, "metal_plug")
#
# Each entry defines all db attributes set on the item at creation.
# typeclass must be the full dotted path.
#
# Fields common to all items:
#   key           str    — display name
#   desc          str    — brief description (held in inventory)
#   typeclass     str    — typeclass path
#   binding_effects dict — binding effect flags (optional)
#
# ─────────────────────────────────────────────────────────────────────────────
# PLUGS
# typeclass: typeclasses.plug_item.PlugItem
# ─────────────────────────────────────────────────────────────────────────────

plugs:

  plain_plug:
    key: "Plain Plug"
    desc: "A smooth silicone plug, modest in size. The base is flared and flat."
    worn_desc: "A plain silicone plug fills the space — smooth, snug, unassuming."
    typeclass: "typeclasses.plug_item.PlugItem"

  glass_plug:
    key: "Glass Plug"
    desc: "A solid glass plug, clear and heavy. Cold to the touch until worn."
    worn_desc: "A glass plug — smooth and dense and notably heavier than expected."
    typeclass: "typeclasses.plug_item.PlugItem"

  metal_plug:
    key: "Metal Plug"
    desc: "A polished steel plug, weighty and cold, with a flat jeweled base."
    worn_desc: "A steel plug, dense and unyielding, seated firmly and going nowhere."
    typeclass: "typeclasses.plug_item.PlugItem"

  knotted_plug:
    key: "Knotted Plug"
    desc: "A silicone plug with a pronounced swollen knot midway up the shaft."
    worn_desc: "A knotted plug — the knot seated fully inside, wide and insistent."
    typeclass: "typeclasses.plug_item.PlugItem"

  flared_plug:
    key: "Flared Plug"
    desc: "A plug with a dramatic equine flare head, broad and unmistakable."
    worn_desc: "The flared plug fills the space completely — the flare spreading wide inside."
    typeclass: "typeclasses.plug_item.PlugItem"

  inflatable_plug:
    key: "Inflatable Plug"
    desc: "A silicone plug with an internal bladder. Use with 'inflate' to expand it."
    worn_desc: "An inflatable plug, seated inside — current fill level: {inflation}."
    typeclass: "typeclasses.plug_item.PlugItem"

  spiral_plug:
    key: "Spiral Plug"
    desc: "A plug with deep corkscrew ridging along its length, porcine-inspired."
    worn_desc: "A spiraled plug fills the space, its ridges pressing at every turn."
    typeclass: "typeclasses.plug_item.PlugItem"

  tail_plug:
    key: "Tail Plug"
    desc: "A smooth plug with a long decorative tail attached to the base. Currently curled."
    worn_desc: "A tail plug, the base seated and the tail hanging free behind."
    typeclass: "typeclasses.plug_item.PlugItem"

  small_plug:
    key: "Small Plug"
    desc: "A slim, tapered plug — easy entry, stays in place without much effort."
    worn_desc: "A small plug, barely noticeable but definitely there."
    typeclass: "typeclasses.plug_item.PlugItem"

  large_plug:
    key: "Large Plug"
    desc: "A substantial plug — wide through the middle and not subtle about it."
    worn_desc: "A large plug, filling the space thoroughly. The stretch is real."
    typeclass: "typeclasses.plug_item.PlugItem"

  extreme_plug:
    key: "Extreme Plug"
    desc: "An oversized plug that makes no compromises. For the serious wearer."
    worn_desc: "An extreme plug seated fully inside — the stretch past comfortable and into something else entirely."
    typeclass: "typeclasses.plug_item.PlugItem"

  vibrating_plug:
    key: "Vibrating Plug"
    desc: "A silicone plug with a small motor inside. Currently inert — vibration system pending."
    worn_desc: "A vibrating plug, seated firmly inside. The motor is quiet for now."
    typeclass: "typeclasses.plug_item.PlugItem"
    extra:
      vibrates: true   # flag for future vibration system

# ─────────────────────────────────────────────────────────────────────────────
# COLLARS
# typeclass: typeclasses.collar_item.CollarItem
# ─────────────────────────────────────────────────────────────────────────────

collars:

  day_collar:
    key: "Day Collar"
    desc: "A thin leather band with a small silver ring — subtle enough to pass as jewelry."
    worn_desc: "A thin leather day collar with a silver ring, sitting close around the throat."
    typeclass: "typeclasses.collar_item.CollarItem"

  training_collar:
    key: "Training Collar"
    desc: "A plain leather collar with a sturdy D-ring at the front. No frills."
    worn_desc: "A plain training collar — leather, D-ring forward, functional."
    typeclass: "typeclasses.collar_item.CollarItem"

  posture_collar:
    key: "Posture Collar"
    desc: "A high, rigid leather collar that holds the chin up. Limits head movement."
    worn_desc: "A posture collar forces the chin up and keeps it there. Head movement is limited."
    typeclass: "typeclasses.collar_item.CollarItem"
    extra:
      posture_modifier: "chin lifted, head still"

  metal_collar:
    key: "Metal Collar"
    desc: "A heavy steel collar with no visible clasp. It looks welded shut."
    worn_desc: "A heavy steel collar — no clasp visible, no obvious way to remove it without help."
    typeclass: "typeclasses.collar_item.CollarItem"
    binding_effects:
      lock_self_remove: true

  latex_collar:
    key: "Latex Collar"
    desc: "A shiny black latex collar, close-fit and smooth."
    worn_desc: "A latex collar, close and shiny, fitted snug around the throat."
    typeclass: "typeclasses.collar_item.CollarItem"

  lace_collar:
    key: "Lace Collar"
    desc: "A delicate lace collar — decorative, not restraining."
    worn_desc: "A lace collar sits at the throat, decorative and light."
    typeclass: "typeclasses.collar_item.CollarItem"

  chain_collar:
    key: "Chain Collar"
    desc: "A collar made of fine metal links, cold and audible."
    worn_desc: "A chain collar — each link cold against the skin, audible when the wearer moves."
    typeclass: "typeclasses.collar_item.CollarItem"

  spiked_collar:
    key: "Spiked Collar"
    desc: "A wide leather collar with blunt exterior spikes. Makes a statement."
    worn_desc: "A spiked collar — leather, wide, spikes pointing outward. A statement piece."
    typeclass: "typeclasses.collar_item.CollarItem"

  ceremony_collar:
    key: "Ceremony Collar"
    desc: "A formal ownership collar, engraved and polished. Meant to be permanent."
    worn_desc: "A ceremony collar — engraved, polished, worn close. The kind meant to stay."
    typeclass: "typeclasses.collar_item.CollarItem"

# ─────────────────────────────────────────────────────────────────────────────
# LEASHES
# typeclass: typeclasses.collar_item.LeashItem
# ─────────────────────────────────────────────────────────────────────────────

leashes:

  leather_leash:
    key: "Leather Leash"
    desc: "A plain leather leash with a clip at one end."
    worn_desc: "a leather leash"
    typeclass: "typeclasses.collar_item.LeashItem"

  chain_leash:
    key: "Chain Leash"
    desc: "A leash of fine metal links. Heavy and audible."
    worn_desc: "a chain leash — each link cold, its sound marking every movement"
    typeclass: "typeclasses.collar_item.LeashItem"

  silk_ribbon:
    key: "Silk Ribbon"
    desc: "A length of silk ribbon knotted as a leash. Delicate but unmistakable."
    worn_desc: "a silk ribbon — delicate, deliberate, wrapped from collar to hand"
    typeclass: "typeclasses.collar_item.LeashItem"

  magic_binding_leash:
    key: "Magic-Binding Leash"
    desc: "A leash that glows faintly with a cold light. Once attached, only the holder can release it."
    worn_desc: "a luminous leash — the light of it trailing from collar to holder's hand, unbreakable from the wearing end"
    typeclass: "typeclasses.collar_item.LeashItem"
    binding_effects:
      auto_consent: true
      lock_navigation: true
      lock_self_remove: true
      lock_self_cmds: true
      pet_triggers: true

