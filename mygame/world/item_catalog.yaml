# ─────────────────────────────────────────────────────────────────────────────
# PLUGS
# ─────────────────────────────────────────────────────────────────────────────
plugs:
  plain_plug:
    key: "Plain Plug"
    desc: "A smooth silicone plug, modest in size — nothing flashy, just does the job."
    worn_desc: "A plain silicone plug, seated snug and smooth. Unassuming, but you know it's there."
    typeclass: "typeclasses.plug_item.PlugItem"

  glass_plug:
    key: "Glass Plug"
    desc: "A solid glass plug, clear and heavier than it looks."
    worn_desc: "A glass plug — smooth, dense, and a good deal heavier inside than you'd expect."
    typeclass: "typeclasses.plug_item.PlugItem"

  metal_plug:
    key: "Metal Plug"
    desc: "A polished steel plug with a flat, jeweled base."
    worn_desc: "A steel plug, dense and unyielding, seated firm and slowly warming from the skin."
    typeclass: "typeclasses.plug_item.PlugItem"

  knotted_plug:
    key: "Knotted Plug"
    desc: "A silicone plug swelling out to a fat, pronounced knot."
    worn_desc: "A knotted plug — the knot seated fully inside, wide and insistent and impossible to forget."
    typeclass: "typeclasses.plug_item.PlugItem"

  flared_plug:
    key: "Flared Plug"
    desc: "A plug with a dramatic equine flare to the head."
    worn_desc: "The flared plug fills the space completely, the flare spreading them wide and holding them there."
    typeclass: "typeclasses.plug_item.PlugItem"

  inflatable_plug:
    key: "Inflatable Plug"
    desc: "A silicone plug with an internal bladder. Use 'inflate' to pump it bigger."
    worn_desc: "An inflatable plug, seated inside and stretching to fill — current fill: {inflation}."
    typeclass: "typeclasses.plug_item.PlugItem"

  spiral_plug:
    key: "Spiral Plug"
    desc: "A plug with deep corkscrew ridging, porcine-inspired and proud of it."
    worn_desc: "A spiraled plug fills the space, its ridges dragging and pressing at every turn."
    typeclass: "typeclasses.plug_item.PlugItem"

  tail_plug_fox:
    key: "Fox Tail Plug"
    desc: "A plug with a bushy red fox tail bouncing off the base."
    worn_desc: "A tail plug seated firm, the fox tail swishing free behind every step."
    typeclass: "typeclasses.plug_item.PlugItem"
    default_zone: "groin"

  tail_plug_bunny:
    key: "Bunny Tail Plug"
    desc: "A small, smooth plug topped with a fluffy white puff of a tail."
    worn_desc: "A bunny tail plug — the puff sits soft and white above the base, twitching with every move."
    typeclass: "typeclasses.plug_item.PlugItem"
    default_zone: "groin"

  tail_plug_equine:
    key: "Horse Tail Plug"
    desc: "A large plug with a long, flowing horse tail trailing from it."
    worn_desc: "A horse tail plug — the big base seated deep, the tail cascading down behind."
    typeclass: "typeclasses.plug_item.PlugItem"
    default_zone: "groin"

  small_plug:
    key: "Small Plug"
    desc: "A slim, tapered plug — slips in easy."
    worn_desc: "A small plug, barely a stretch but very much there."
    typeclass: "typeclasses.plug_item.PlugItem"

  large_plug:
    key: "Large Plug"
    desc: "A substantial plug, wide through the middle and not shy about it."
    worn_desc: "A large plug filling them thoroughly. The stretch is real and constant."
    typeclass: "typeclasses.plug_item.PlugItem"

  extreme_plug:
    key: "Extreme Plug"
    desc: "An oversized plug that makes absolutely no compromises."
    worn_desc: "An extreme plug seated to the hilt — the stretch is well past comfortable and into something else entirely."
    typeclass: "typeclasses.plug_item.PlugItem"

  vibrating_plug:
    key: "Vibrating Plug"
    desc: "A silicone plug with a little motor humming inside. Needs a remote to drive it."
    worn_desc: "A vibrating plug, seated firm and waiting for someone's thumb on the remote."
    typeclass: "typeclasses.vibration_item.VibratingPlugItem"

  vibrating_egg:
    key: "Vibrating Egg"
    desc: "A smooth, egg-shaped vibrating insert, run from a remote."
    worn_desc: "A vibrating egg tucked away inside — quiet for now."
    typeclass: "typeclasses.vibration_item.VibratingPlugItem"

