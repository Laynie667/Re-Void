# ─────────────────────────────────────────────────────────────────────────────
# PLUGS
# ─────────────────────────────────────────────────────────────────────────────
plugs:
  plain_plug:
    key: "Plain Plug"
    desc: "A smooth silicone plug, modest in size."
    worn_desc: "A plain silicone plug fills the space — smooth, snug, unassuming."
    typeclass: "typeclasses.plug_item.PlugItem"

  glass_plug:
    key: "Glass Plug"
    desc: "A solid glass plug, clear and heavy."
    worn_desc: "A glass plug — smooth and dense and notably heavier than expected."
    typeclass: "typeclasses.plug_item.PlugItem"

  metal_plug:
    key: "Metal Plug"
    desc: "A polished steel plug with a flat jeweled base."
    worn_desc: "A steel plug, dense and unyielding, seated firmly."
    typeclass: "typeclasses.plug_item.PlugItem"

  knotted_plug:
    key: "Knotted Plug"
    desc: "A silicone plug with a pronounced swollen knot."
    worn_desc: "A knotted plug — the knot seated fully inside, wide and insistent."
    typeclass: "typeclasses.plug_item.PlugItem"

  flared_plug:
    key: "Flared Plug"
    desc: "A plug with a dramatic equine flare head."
    worn_desc: "The flared plug fills the space completely — the flare spreading wide inside."
    typeclass: "typeclasses.plug_item.PlugItem"

  inflatable_plug:
    key: "Inflatable Plug"
    desc: "A silicone plug with an internal bladder. Use 'inflate' to expand it."
    worn_desc: "An inflatable plug, seated inside — current fill: {inflation}."
    typeclass: "typeclasses.plug_item.PlugItem"

  spiral_plug:
    key: "Spiral Plug"
    desc: "A plug with deep corkscrew ridging, porcine-inspired."
    worn_desc: "A spiraled plug fills the space, its ridges pressing at every turn."
    typeclass: "typeclasses.plug_item.PlugItem"

  tail_plug_fox:
    key: "Fox Tail Plug"
    desc: "A plug with a bushy red fox tail attached to the base."
    worn_desc: "A tail plug seated firmly; the fox tail hangs free behind."
    typeclass: "typeclasses.plug_item.PlugItem"
    default_zone: "groin"

  tail_plug_bunny:
    key: "Bunny Tail Plug"
    desc: "A small smooth plug with a fluffy white puff tail."
    worn_desc: "A bunny tail plug — the puff tail sits above the base, soft and white."
    typeclass: "typeclasses.plug_item.PlugItem"
    default_zone: "groin"

  tail_plug_equine:
    key: "Horse Tail Plug"
    desc: "A large plug with a long flowing horse tail attached."
    worn_desc: "A horse tail plug — large base seated, the tail cascading behind."
    typeclass: "typeclasses.plug_item.PlugItem"
    default_zone: "groin"

  small_plug:
    key: "Small Plug"
    desc: "A slim tapered plug — easy entry."
    worn_desc: "A small plug, barely noticeable but definitely there."
    typeclass: "typeclasses.plug_item.PlugItem"

  large_plug:
    key: "Large Plug"
    desc: "A substantial plug — wide through the middle."
    worn_desc: "A large plug filling the space thoroughly. The stretch is real."
    typeclass: "typeclasses.plug_item.PlugItem"

  extreme_plug:
    key: "Extreme Plug"
    desc: "An oversized plug that makes no compromises."
    worn_desc: "An extreme plug seated fully — the stretch past comfortable and into something else."
    typeclass: "typeclasses.plug_item.PlugItem"

  vibrating_plug:
    key: "Vibrating Plug"
    desc: "A silicone plug with a small motor inside. Requires a remote control."
    worn_desc: "A vibrating plug, seated firmly."
    typeclass: "typeclasses.vibration_item.VibratingPlugItem"

  vibrating_egg:
    key: "Vibrating Egg"
    desc: "A smooth egg-shaped vibrating insert. Controlled remotely."
    worn_desc: "A vibrating egg settled inside — quiet for now."
    typeclass: "typeclasses.vibration_item.VibratingPlugItem"

