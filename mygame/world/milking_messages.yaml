    start:
      - "The machine accelerates — the motor climbs to a higher note, the cups lock to {target} with firmer compression, and the draw comes quickly."
      - "Fast: the rhythm tightens immediately. The cups press hard against {target} and the suction arrives in rapid cycles. More insistent than steady."
