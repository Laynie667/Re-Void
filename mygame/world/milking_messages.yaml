    running:
      - "The machine maintains its slow, even draw — the cups holding {target} in a steady rhythm, each cycle complete before the next begins. The hum is low."
      - "A quiet, patient pull through the cups. {target}'s body gives a little with each slow cycle. The machine takes it and continues."
      - "Slow suction holds its rhythm. The motor is barely audible at this setting. The cups stay close against {target}, the draw unchanged."
      - "The cups work at the machine's lowest pace — each pull gentle, each release measured. Against {target}, the suction barely rises above comfortable."
      - "Low and steady: the rhythm is almost meditative at this speed. The cups press and release against {target} in their slow, patient count."
      - "The hum of the machine at its gentlest setting. The cups draw from {target} with the unhurried certainty of something that has all the time it needs."

    first_empty:
      - "The draw comes and finds little. {target} is running dry at this pace, but the machine's slow rhythm doesn't adjust — the cups continue as before."
      - "The pull finds less than it expected. {target} is nearly empty, but the slow rhythm persists. The cups maintain their seal and keep cycling."

    running_empty:
      - "The slow draw continues. The cups hold {target} and cycle through as before — finding little now, but unhurried about the absence of output."
      - "Nothing comes, but the patient rhythm doesn't acknowledge it. The cups press and release against {target} in the same slow count as before."
      - "The machine continues its gentle cycle against {target} through the empty return. The hum is unchanged. The cups maintain their seal."

    stop:
      - "The machine's hum fades by degrees — the suction easing before the cups release {target}. A slow decompression, then quiet."
      - "Slow speed winds down in stages. The pressure releases, the cups loosen from {target}, the motor settles."

  steady:
    interval_seconds: 60
    ml_per_session_tick: 11.0

    start:
      - "The machine settles into its working rhythm — steady suction, the cups fitting to {target} with the confidence of equipment that knows its purpose."
      - "Steady speed: the cups compress against {target} and the draw begins immediately. Measured, reliable, consistent."
      - "The machine finds its pace quickly at steady setting. The cups seal to {target} and the rhythm establishes itself without ceremony."
      - "A working hum as the machine starts at steady. The cups hold {target} in an even, purposeful pull — neither demanding nor gentle."

    running:
      - "Steady suction — the cups working {target} in a measured rhythm, each draw taking what has accumulated since the last. The motor holds its note."
      - "The cups press and pull against {target} in the machine's working rhythm. Consistent. Purposeful. Not asking permission."
      - "The motor holds its working frequency. The cups maintain their seal and draw from {target} at steady intervals, the rhythm unchanged."
      - "A regular pull through each cycle. {target}'s body answers the machine's steady draw honestly."
      - "Steady extraction: the cups work {target} in an even rhythm that leaves little ambiguity about what is happening here."
      - "The machine at its working speed draws from {target} with the reliability of something designed for exactly this — consistent pressure, consistent pace."

    first_empty:
      - "The draw comes and finds {target} nearly empty. The machine doesn't slow — the rhythm continues at steady pace through the diminishing return."
      - "Running dry. The cups find less than before with each cycle, but the steady rhythm doesn't adjust for it."

    running_empty:
