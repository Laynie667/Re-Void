# These fire when accumulated volume crosses these thresholds.
# Used alongside the existing milking machine thresholds.
# ---------------------------------------------------------------------------

testes_fullness:
  thresholds:
    - ml: 50000      # 50L — hot-tub scale
      private: true
      messages:
        - "Fifty litres. The weight of what's accumulated inside you has passed from sensation into structural reality. Your body is doing its best."
        - "The pressure at this volume has stopped being background and become the entire foreground. Fifty litres, distributed and insistent and not going anywhere on its own."

    - ml: 200000     # 200L — small room scale
      private: true
      messages:
        - "Two hundred litres of pressure and your body has been making its position clear for some time. The milking machine is not a thought. It is the only thought."
        - "At this volume the usual language has stopped applying. Your body resolved the question of what it needs. It has been resolving it, loudly, for longer than is comfortable."

    - ml: 1000000    # 1kL — room scale
      private: true
      messages:
        - "A thousand litres. The physical reality of carrying this has stopped requiring description. It is simply the entire situation. The machine exists as the only remaining subject."
        - "One kilolitre. You are aware of very little else. Your body stopped framing this as a preference some time ago."

    - ml: 10000000   # 10kL — house-filling
      private: true
      messages:
        - "Ten thousand litres. The concept of comfortable has been theoretical for a long time. Your body has had one clear position on this matter and has been expressing it without subtlety."
        - "At this volume words like 'full' have stopped being adequate. You are carrying ten thousand litres and your body has moved past asking and into demanding."

    - ml: 100000000  # 100kL — beyond
      private: true
      messages:
        - "One hundred thousand litres. The idea of describing what this feels like has become academic. Your body's argument is total and has been total for longer than memory comfortably covers."
        - "Past the point where this conversation can be had in normal language. The pressure is everything. The machine is not a thought — it is the only remaining physical fact that matters."

# ---------------------------------------------------------------------------
# WombRoom messages
#
# entry        — room-visible (inside) when someone enters through the zone
#                tokens: {actor} {host} {zone}
# exit         — room-visible (inside) when someone leaves
#                tokens: {actor} {host} {zone}
# flood_trace  — appended to room desc at trace fluid level
#                tokens: {fluid} {volume}
# flood_shallow — shallow level
# flood_knee   — knee-deep
# flood_chest  — chest-deep
# flood_full   — at capacity
# shaft_visible — private to residents when host's zone is penetrated
#                tokens: {actor} {host} {zone}
# pulse        — broadcast inward from host to residents
#                tokens: {host} {message}
# ---------------------------------------------------------------------------

womb:
  entry:
    - "The walls shift around {actor} — a slow, warm pressure as they pass through {host}'s {zone} and settle into the interior. The space accepts them."
    - "{actor} crosses the threshold and the world outside becomes distant and irrelevant. The warmth of {host}'s interior closes in around them."
    - "A yielding resistance, then {actor} is through — inside {host}'s {zone}, the air close and warm and carrying the faint sound of a heartbeat."
    - "{actor} slips inside. The passage through {host}'s {zone} is brief and unmistakable. The interior space settles around them."

  exit:
    - "{actor} passes back through {host}'s {zone} and is gone. The space contracts slightly in their absence."
    - "The walls part for {actor} and close again behind them. {host}'s {zone} swallows the exit without ceremony."
    - "{actor} makes their way out through {host}'s {zone}. The warmth remains. The space is a little emptier."
    - "A brief parting, and {actor} is through. {host}'s {zone} settles back. The interior is quieter now."

  flood_trace:
    - "The floor is barely damp — a trace of {fluid} that settles in the lowest points and catches the light."
    - "A faint warmth underfoot. {fluid} has begun to gather in the corners, shallow and still."

  flood_shallow:
    - "A shallow layer of {fluid} covers the floor — {volume} of warmth that shifts with every movement and carries a faint scent."
    - "{volume} of {fluid} pools across the floor, warm and slow. The space smells of it. The level is rising."
    - "The {fluid} comes to the ankle now. {volume} accumulated and unhurried, swirling faintly with movement."

  flood_knee:
    - "Knee-deep in {fluid} now — {volume} of slow warmth that resists movement and fills the lower half of the space entirely."
    - "The {fluid} has risen to the knee. {volume}, warm and thick, that makes every step deliberate and slow."
    - "{volume} of {fluid} at knee depth. The space is half-filled and still climbing. The warmth is total."

  flood_chest:
    - "Chest-deep. {volume} of {fluid} surrounds everything below the shoulders — warm and close, the current faint but constant."
    - "The {fluid} reaches the chest now. {volume}. Movement requires effort. The warmth is complete and immersive."
    - "{volume} of {fluid} at chest height. The buoyancy is real. The pressure of it against the body is constant and total."

  flood_full:
    - "The {fluid} fills this space entirely — {volume} at capacity, warm and still and complete. There is no surface to speak of."
    - "Full. {volume} of {fluid} from floor to ceiling, the space saturated. Movement is swimming. The warmth is total."
    - "Every millimetre occupied. {volume} of {fluid}, at capacity, pressing gently outward against the walls of {host}'s interior."

  shaft_visible:
    - "Something intrudes from outside — a shape pressing through {host}'s {zone} from the other direction. The space shifts to accommodate it."
    - "The wall of {host}'s {zone} yields and something pushes through — {actor} making their presence felt from the outside in."
    - "A blunt intrusion through {host}'s {zone} — {actor}'s presence arrives before they do. The space adjusts around it."
    - "The passage through {host}'s {zone} is occupied from the other side now. {actor}'s shape is unmistakable through the wall."

  pulse:
    - "{host}'s voice carries inward — resonant and close, the words arriving from everywhere at once: \"{message}\""
    - "A vibration through the walls, and then {host}'s voice fills the space: \"{message}\""
    - "{host} speaks through the wall of the space and the sound of it is everywhere: \"{message}\""
    - "From somewhere outside but impossibly close, {host}'s voice: \"{message}\""
