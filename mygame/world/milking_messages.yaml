# Token: {target} is replaced with the target character's RP name.
# All running/stop messages broadcast to the room.
# Fullness threshold messages are private to the character only.
#
# Add as many messages to any pool as you like — more = better variety.
# Pools: start, running, first_empty, running_empty, stop

speeds:

  slow:
    interval_seconds: 120
    ml_per_session_tick: 4.0

    start:
      - "The machine hums to life at its lowest setting — a patient, quiet sound. The cups settle against {target} and seal, the first draw barely a suggestion."
      - "Slow speed establishes itself without announcement. The cups compress gently against {target} and the suction builds to a steady, unhurried minimum."
      - "The machine begins with the patience of something in no hurry whatsoever. The cups find {target} and the first pull is even and barely felt."
