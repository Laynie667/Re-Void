# world/milking_messages.yaml
#
# Message pools for the milking machine session system.
#
# Token: {target} is replaced with the target character's RP name.
# All running/stop messages broadcast to the room.
# Fullness threshold messages are private to the character only.
#
# Add as many messages to any pool as you like — more = better variety.
# Pools: start, running, first_empty, running_empty, stop

speeds:

  slow:
    interval_seconds: 120
    ml_per_session_tick: 4.0

    start:
      - "The machine hums to life at its lowest setting — a patient, quiet sound. The cups settle against {target} and seal, the first draw barely a suggestion."
      - "Slow speed establishes itself without announcement. The cups compress gently against {target} and the suction builds to a steady, unhurried minimum."
      - "The machine begins with the patience of something in no hurry whatsoever. The cups find {target} and the first pull is even and barely felt."
      - "A soft mechanical breath — the cups seal to {target} at slow speed and the draw begins at its most gentle. Present, but not pressing."

    running:
      - "The machine maintains its slow, even draw — the cups holding {target} in a steady rhythm, each cycle complete before the next begins. The hum is low."
      - "A quiet, patient pull through the cups. {target}'s body gives a little with each slow cycle. The machine takes it and continues."
      - "Slow suction holds its rhythm. The motor is barely audible at this setting. The cups stay close against {target}, the draw unchanged."
      - "The cups work at the machine's lowest pace — each pull gentle, each release measured. Against {target}, the suction barely rises above comfortable."
      - "Low and steady: the rhythm is almost meditative at this speed. The cups press and release against {target} in their slow, patient count."
      - "The hum of the machine at its gentlest setting. The cups draw from {target} with the unhurried certainty of something that has all the time it needs."

    first_empty:
      - "The draw comes and finds little. {target} is running dry at this pace, but the machine's slow rhythm doesn't adjust — the cups continue as before."
      - "The pull finds less than it expected. {target} is nearly empty, but the slow rhythm persists. The cups maintain their seal and keep cycling."

    running_empty:
      - "The slow draw continues. The cups hold {target} and cycle through as before — finding little now, but unhurried about the absence of output."
      - "Nothing comes, but the patient rhythm doesn't acknowledge it. The cups press and release against {target} in the same slow count as before."
      - "The machine continues its gentle cycle against {target} through the empty return. The hum is unchanged. The cups maintain their seal."

    stop:
      - "The machine's hum fades by degrees — the suction easing before the cups release {target}. A slow decompression, then quiet."
      - "Slow speed winds down in stages. The pressure releases, the cups loosen from {target}, the motor settles."

  steady:
    interval_seconds: 60
    ml_per_session_tick: 11.0

    start:
      - "The machine settles into its working rhythm — steady suction, the cups fitting to {target} with the confidence of equipment that knows its purpose."
      - "Steady speed: the cups compress against {target} and the draw begins immediately. Measured, reliable, consistent."
      - "The machine finds its pace quickly at steady setting. The cups seal to {target} and the rhythm establishes itself without ceremony."
      - "A working hum as the machine starts at steady. The cups hold {target} in an even, purposeful pull — neither demanding nor gentle."

    running:
      - "Steady suction — the cups working {target} in a measured rhythm, each draw taking what has accumulated since the last. The motor holds its note."
      - "The cups press and pull against {target} in the machine's working rhythm. Consistent. Purposeful. Not asking permission."
      - "The motor holds its working frequency. The cups maintain their seal and draw from {target} at steady intervals, the rhythm unchanged."
      - "A regular pull through each cycle. {target}'s body answers the machine's steady draw honestly."
      - "Steady extraction: the cups work {target} in an even rhythm that leaves little ambiguity about what is happening here."
      - "The machine at its working speed draws from {target} with the reliability of something designed for exactly this — consistent pressure, consistent pace."

    first_empty:
      - "The draw comes and finds {target} nearly empty. The machine doesn't slow — the rhythm continues at steady pace through the diminishing return."
      - "Running dry. The cups find less than before with each cycle, but the steady rhythm doesn't adjust for it."

    running_empty:
      - "Steady pull, empty return. The cups cycle against {target} with the same even rhythm, drawing what little remains or nothing at all."
      - "The machine continues its steady draw against {target} through the empty cycles — consistent pressure, unchanged rhythm."
      - "Nothing comes now, but the steady rhythm persists against {target}. The cups stay sealed and cycle as before."

    stop:
      - "The machine completes its cycle and powers down — suction easing, cups releasing {target} in a smooth decompression."
      - "Steady speed ends cleanly — a brief deceleration, the cups loosening from {target}, the motor dropping to quiet."

  fast:
    interval_seconds: 30
    ml_per_session_tick: 22.0

    start:
      - "The machine accelerates — the motor climbs to a higher note, the cups lock to {target} with firmer compression, and the draw comes quickly."
      - "Fast: the rhythm tightens immediately. The cups press hard against {target} and the suction arrives in rapid cycles. More insistent than steady."
      - "The machine goes to fast speed with a rise in the motor's pitch. The cups find {target} and draw in quick, firm pulls."
      - "A sharper hum. The cups seal harder to {target} and the rhythm quickens — each draw rapid, each cycle leaving less time than the last."

    running:
      - "The cups pull hard and quickly — the machine working {target} at fast speed, the draw coming faster than the body fully refills between cycles."
      - "Fast suction leaves little interval between pulls. The cups press against {target} with a firmness that makes the setting's name accurate."
      - "The motor runs at its higher register. The cups work {target} in rapid, firm compression — insistent, thorough, quick."
      - "Each cycle draws faster than the last gave. The cups press against {target} in quick succession, the pull demanding."
      - "The machine's rhythm is tight now — rapid cycles, firm compression, the draw insistent against {target}."
      - "At fast speed the suction doesn't pause long enough to allow reconsideration. The cups lock to {target} and draw with urgency."

    first_empty:
      - "The fast pull hits empty. {target} has little left, but the machine's rapid rhythm doesn't slow for it. The cups continue pressing."
      - "Running dry at fast speed — the rapid cycles find less with each pass, but the pace doesn't adjust. The cups drive on."

    running_empty:
      - "Fast and relentless against empty. The cups press hard to {target} in rapid cycles, pulling through the absence of output as if it hasn't registered."
      - "The rhythm doesn't adjust for empty at this speed — the cups work {target} with the same fast, firm draw, finding nothing but maintaining the pace."
      - "Full speed, empty return. The cups continue their rapid pull against {target}, the motor at its higher note, indifferent."

    stop:
      - "The machine drops quickly from fast speed — suction cutting, cups releasing {target} with a sharp decompression. The room drops in volume."
      - "Fast speed ends decisively: a few rapid deceleration cycles, the cups loosening their grip on {target}, the motor falling."

  intense:
    interval_seconds: 10
    ml_per_session_tick: 38.0

    start:
      - "The machine goes to maximum — the motor climbs to a high, sustained note, the cups lock to {target} with full pressure, and the draw is deep and immediate."
      - "Intense: the cups compress to {target} with force that isn't a question. The suction comes in rapid, deep cycles. The motor is loud at this setting."
      - "Full draw from the first moment. The cups seal hard to {target} and the machine runs at maximum — rapid, deep, unrelenting."
      - "The motor reaches its top note. The cups lock against {target} and the rhythm is tight and deep and does not spare anything."

    running:
      - "Deep, persistent suction at maximum intensity — the cups driving against {target} in rapid succession, the draw pulling ahead of accumulation."
      - "Maximum draw: the cups press against {target} in rapid, deep compression. The rhythm leaves no ambiguity about intent or pace."
      - "At full intensity the draw is constant and demanding — the cups working {target} in deep, fast cycles, the motor loud, the output consistent."
      - "The cups drive against {target} with maximum pressure, rapid cycling, the pull taking everything available and reaching for more."
      - "Intense speed doesn't negotiate. The cups lock to {target} and the machine runs at full extraction — deep, rapid, thorough."
      - "Full intensity against {target}: deep compression, rapid rhythm, the suction at its heaviest. The machine is working at capacity."

    first_empty:
      - "The intense draw hits empty — {target} has nothing left, but the machine's full-speed rhythm doesn't acknowledge this. Maximum pressure continues."
      - "Maximum draw, nothing remaining. The cups hammer against {target} at full intensity through the first empty cycle. The motor stays at pitch."

    running_empty:
      - "Intense and empty: the cups drive against {target} at maximum force through each dry cycle — deep compression, rapid rhythm, no reduction."
      - "The machine runs at full intensity against {target} through the empty cycles. The motor loud, the rhythm relentless, the output absent."
      - "Full draw on nothing. The cups work {target} at maximum suction through the dry cycles, the speed unchanged, the pressure unchanged."

    stop:
      - "The machine cuts from intense speed sharply — the motor drops, the cups release {target} in a hard decompression. The room is noticeably quieter."
      - "Intense ends with a cut: motor down, suction off, the cups releasing {target}. The silence after this setting has a quality to it."

# ---------------------------------------------------------------------------
# Fullness threshold messages — private to the character only.
# Fired once per threshold crossing per fill cycle (reset on extraction).
# ---------------------------------------------------------------------------

fullness:
  thresholds:
    - ml: 100
      private: true
      messages:
        - "A faint awareness settles in — not discomfort yet, just a presence. Something has been accumulating and your body has noticed."
        - "The first edge of fullness arrives without urgency. It's simply there now, at the edge of attention."
        - "There's a fullness beginning that hasn't demanded anything yet. Your body has filed it under 'noted.'"

    - ml: 300
      private: true
      messages:
        - "The fullness has weight to it now — heavier than before, occupying a corner of your attention whether you invite it or not."
        - "It's become harder to ignore. The pressure has moved from presence to something that sits with you consistently."
        - "A noticeable heaviness. Not uncomfortable exactly, but past the point of simply going unnoticed."

    - ml: 600
      private: true
      messages:
        - "Discomfort has made itself a permanent fixture now. The pressure is real and steady, and your thoughts turn unbidden toward the milking machine."
        - "Concentration on other things is a conscious effort. The fullness presses with a consistency that wants attention."
        - "The fullness has shifted from background to foreground. The milking machine is a specific thought rather than an abstract one."

    - ml: 900
      private: true
      messages:
        - "The pressure is pronounced enough now that it shapes how you hold yourself — insistent, constant, hard to work around. The milking machine is a destination."
        - "It's difficult to concentrate through. The fullness at this level wants specific attention and has stopped being subtle about it."
        - "Urgent now in a way that has nothing to do with preference. Your body has made its position clear and is not interested in negotiation."

    - ml: 1200
      private: true
      messages:
        - "Past the point of comfort by a significant margin. Every movement registers against the fullness. Resolution is the only coherent direction your thoughts are moving."
        - "The pressure is a constant, occupying thing. Your attention cannot leave it and your body has stopped being quiet about it."
        - "At this volume the milking machine exists in your awareness as the single most relevant object in the room. Your body has reached a conclusion."

    - ml: 2000
      private: true
      messages:
        - "The fullness has become a visible distension — a shape, not just a pressure. Two litres of accumulated weight and your body has been making its case for some time."
        - "Concentration on anything else requires active effort. The distension is substantial and has been for a while. The milking machine is not an abstract thought."
        - "Two thousand millilitres. The physical weight of it is real and present and your body has stopped framing this as a preference."

    - ml: 3785
      private: true
      messages:
        - "A full gallon of pressure. The weight and volume together are physically demanding in a way that has moved well past discomfort into its own territory."
        - "One gallon, distributed entirely within you. Your body's objections have been ongoing and well-articulated. The machine exists as a specific, necessary destination."
        - "A gallon. The actual physical reality of carrying this has shaped how you've been holding yourself for some time. Resolution is the only coherent plan."

    - ml: 7570
      private: true
      messages:
        - "Two gallons. The distension is significant and visible. Every movement negotiates around what you're carrying. There is no longer a question of whether the machine is needed."
        - "The volume you're carrying would fill a substantial container. You are that container and you have been aware of this for longer than is comfortable to acknowledge."
        - "Two gallons of accumulated pressure. The milking machine is not a thought — it is the thought. Everything else is a secondary consideration."

    - ml: 15000
      private: true
      messages:
        - "Four gallons. The physical reality of this has stopped requiring description — it is simply the entire situation. Your body resolved this question some time ago."
        - "At this volume the usual language has stopped being adequate. Four gallons of pressure, and your body has been making a very clear argument about this for a considerable time."
        - "This is the part where the milking machine stops being an option and becomes the only remaining subject. Your body reached that conclusion some time ago."

# ---------------------------------------------------------------------------
# Size-aware ambient messages — private to the character.
# Fired occasionally (~30% chance per 15-min tick) when body mod size
# exceeds the threshold. The highest matching tier fires.
# Size values use the body mod float scale: G=7, L=12, Z=26, Monumental=30+
# ---------------------------------------------------------------------------

size_ambient:
  tiers:
    - min_size: 38.0   # Gravitationally Concerning / Beyond Classification
      messages:
        - "The descriptor stopped being hyperbole. Everything nearby bends toward the weight they carry, including posture, balance, and the attention of everyone in the room."
        - "At this scale they are not a feature — they are a condition. Your body organizes around them entirely and has for some time. There is no version of a moment that doesn't account for them."
        - "Gravitationally Concerning is the label, and it has stopped being funny. The weight is its own weather system. Movement is a negotiation."

    - min_size: 34.0   # Architecturally Significant / Incomprehensible
      messages:
        - "The term architecturally significant has taken on a literal quality. No position or movement fails to account for them first. They precede every decision your body makes."
        - "They are a structural fact of every room you enter. The weight is total, the presence is constant, and your body has reorganized itself around them as a baseline condition."
        - "Moving with them requires planning. They carry their own momentum. Every doorway is a consideration."

    - min_size: 30.0   # Monumental / named absurd tiers begin
      messages:
        - "They exist as a physical force rather than a size. They precede you into rooms. They dictate how you sit and stand and breathe. Your center of gravity has relocated."
        - "At this scale the weight is not something you carry — it's something you are organized around. Every posture accounts for them before anything else."
        - "Monumental is accurate. The weight is constant, total, and has been reshaping the way your body moves for long enough that it feels like baseline now."

    - min_size: 26.0   # Z cup and above / Structurally Significant testicles
      messages:
        - "At this size they can't be negotiated with or ignored. Every posture accounts for them first. Every movement negotiates around the weight."
        - "The weight is a constant companion that has rewritten what resting feels like. Your center of gravity has shifted. It is simply the state of things."
        - "They are present in everything — standing, sitting, moving, staying still. The weight has been consistent long enough that its absence would be the remarkable thing."

    - min_size: 12.0   # L cup and above / Very Large and above
      messages:
        - "The size of them shapes how you hold yourself without your input. They displace weight in every position and your body has built its habits around this."
        - "A significant presence, continuous and physical. Not painful, not incapacitating — simply always there, always accounted for, always part of the geometry."
        - "They are simply always there — preceding your movements, carrying their own momentum, occupying their own space."

    - min_size: 7.0    # G cup and above / Large and above
      messages:
        - "The weight of them is present in everything you do — a consistent physical fact your body has organized itself around."
        - "They precede your movements by their own momentum. It is not painful, just a continuous, familiar heaviness that has become part of how you take up space."
        - "A persistent, pleasant weight — notable at rest, more notable in motion. The kind of thing that becomes familiar without ever becoming ignorable."

# ---------------------------------------------------------------------------
# Leaking conditions — size + volume thresholds combined.
# room_visible: true → broadcast to room with {target} token
# room_visible: false → private to character
# The highest matching condition fires per tick.
# ---------------------------------------------------------------------------

leaking:
  conditions:
    - min_size: 38.0    # Gravitationally Concerning+
      min_volume: 0     # volume-independent — always leaking at this scale
      room_visible: true
      messages:
        - "{target}'s presence in the room has already marked the floor. At the scale they carry, leaking is not a condition — it is a baseline. The floor confirms this."
        - "At the size {target} carries, retention is a technical impossibility. The drip is constant, unhurried, and entirely inevitable."
        - "A steady trail follows {target}. The scale of them has simply outpaced any capacity for containment regardless of volume."

    - min_size: 34.0    # Architecturally Significant+
      min_volume: 0
      room_visible: true
      messages:
        - "{target} is leaking steadily — at the size they carry, the threshold for containment requires no particular volume to exceed."
        - "The floor beneath {target} is marked and being marked further. The combination of size and capacity has resolved the question of retention."
        - "Leaking, continuously, at a pace that requires no particular fullness to maintain. {target}'s scale handles that independently."

    - min_size: 30.0    # Monumental+
      min_volume: 50
      room_visible: true
      messages:
        - "{target} is leaking continuously at the pace their size demands — the volume present is more than sufficient context."
        - "A steady drip from {target} — the size and the pressure together have long since resolved the question of containment."
        - "At {target}'s scale and this volume, leaking is simply what happens. The floor is already aware."

    - min_size: 26.0    # Z cup+ / Structurally Significant+
      min_volume: 100
      room_visible: true
      messages:
        - "{target} is dripping visibly — the combination of size and pressure has exceeded any threshold of retention. The floor marks their position."
        - "A consistent drip from {target}. At this size and volume the pressure has found its exit and is not being particularly subtle about it."
        - "Fluid tracks down {target} in a thin, steady line. The size and the fullness together have made containment a past tense condition."

    - min_size: 12.0    # L cup+ / Very Large+
      min_volume: 300
      room_visible: true
      messages:
        - "A thin drip marks {target}'s position — size and volume together have brought them to the threshold where the pressure expresses itself visibly."
        - "{target} is beginning to drip. The combination of size and fullness has crossed the line between internal and external."
        - "Slow and visible — a bead forms at {target}'s nipple and drops. The pressure has found its expression."

    - min_size: 7.0     # G cup+ / Large+
      min_volume: 600
      room_visible: false
      messages:
        - "A warmth at the tips — not yet visible, but felt. The pressure and the size together have brought you to the edge of passive escape."
        - "There's a dampness that wasn't there before. The fullness has reached the threshold where the size is no longer fully containing it."
        - "The pressure has begun to express itself. Not visible yet, but present — a warmth at the tips that will become more apparent if nothing changes."

# ---------------------------------------------------------------------------
# Milking phase pools — universal (not speed-specific).
# Priming fires when a session starts and stock is high.
# Tapering fires when stock drops below ~15%.
# The session script picks from these instead of 'running' at those moments.
# ---------------------------------------------------------------------------

phases:

  priming:
    - "The machine finds its draw before full flow — the first pulls pulling from close to the surface. {target}'s body is building toward what the machine is asking for."
    - "The session is finding itself — cups sealed, rhythm establishing, the flow beginning its slow build before it reaches working pressure."
    - "The early draw: the machine pulls steadily and {target} gives into it by degrees, the flow still gathering rather than arrived."
    - "First pulls, full seal. The suction has found {target} and the rhythm is establishing. The flow hasn't peaked yet."

  tapering:
    - "The draw is diminishing — the cups work {target} but each pull finds less than the last. The machine doesn't slow, but the output does."
    - "Running down: the flow from {target} has begun its taper, the rhythm unchanged but the return growing thinner with each cycle."
    - "The end of the supply is in sight. The cups still work {target} with the same pull, but the response has thinned. Nearly done."
    - "Tapering — each draw from {target} yields a little less than the one before it. The cups hold their pressure, the machine holds its pace."

# ---------------------------------------------------------------------------
# Arousal threshold messages — private to the character only.
# Fired as arousal crosses 75, 90, and 95.
# ---------------------------------------------------------------------------

arousal:

  thresholds:
    - value: 75
      messages:
        - "Something has shifted past background — an urgency that is no longer passive. You are aware of it with a specificity that is difficult to redirect."
        - "The building pressure has crossed a line from present to insistent. It has an opinion now."
        - "Seventy-five percent of the way to somewhere. Your body has its own momentum on this now."

    - value: 90
      messages:
        - "The pressure has reached the point where managing it requires active attention. It is the primary thing your awareness is doing."
        - "Very close. The specificity of what your body wants has resolved from general to exact."
        - "Ninety. There is not a great deal of road left, and your body is fully aware of this."

    - value: 95
      messages:
        - "The threshold is immediately ahead and your body is no longer pretending otherwise."
        - "Five points from the end. The decision has been made. Only the timing remains."
        - "Nearly there. The pressure has stopped taking suggestions about pace."

  climax:
    - "{target} reaches the threshold — the response immediate, specific, and entirely outside the range of things they can delay."
    - "The pressure resolves for {target} — a release that lands exactly where it was building toward."
    - "{target}'s body makes its conclusion. The evidence is not in question."
    - "The climax arrives for {target} with the finality of something that has been coming for some time."

  surface_deposit:
    - "{actor} deposits onto {surface}. The evidence settles and remains."
    - "{actor} releases onto {surface} — the deposit present and specific."

  internal_deposit:
    - "{actor} reaches the end inside {target}'s {zone}. The deposit is complete."
    - "The climax resolves for {actor} — the release internal to {target}'s {zone}."


# ---------------------------------------------------------------------------
# Inflation system messages
# Tokens: {target} {zone} {fluid} {volume}
# Called by inflate_commands.py when volume state changes.
# States: slight / notable / full / overfull / drain
# ---------------------------------------------------------------------------

inflation:
  slight:
    - "{target}'s {zone} holds the addition without protest — a new softness, a small weight that wasn't there before. The change is present but not pressing."
    - "The first volume settles into {target}'s {zone} with the ease of something barely begun. Slight, but registered."
    - "A faint fullness finds {target}'s {zone}. The {fluid} is there now — a beginning rather than a condition."
    - "The {zone} accepts it without difficulty. A slight warmth distributed across the interior, {target}'s body cataloguing it without urgency."

  notable:
    - "{target}'s {zone} carries the volume clearly now — the fullness past the point where it might be overlooked. The {fluid} is present in a way the body doesn't ignore."
    - "The {fluid} has reached a volume that registers specifically in {target}'s {zone}. Full enough to be felt distinctly with every movement."
    - "The fullness in {target}'s {zone} has moved from presence to acknowledgement. {volume} of {fluid} inside is its own fact now."
    - "Notable fullness: the {zone} holds {volume} and the shape of it is apparent. Not uncomfortable, but past subtle."

  full:
    - "{target}'s {zone} is at capacity — the {fluid} filling it completely, the pressure consistent and total. The fullness has resolved from notable to insistent."
    - "Full. The {zone} holds every millilitre it can, the {fluid} pressing outward against the interior. {target}'s body has been made aware."
    - "The {zone} has reached its limit. The pressure of {volume} of {fluid} inside {target} is past simple awareness — it shapes how they hold themselves."
    - "At full capacity, {target}'s {zone} makes itself known with every breath. The {fluid} fills the space completely. There is no part of it that isn't occupied."

  overfull:
    - "Past full. {target}'s {zone} holds more than it was designed for, the {fluid} pressing outward beyond comfortable limits. The distension is visible."
    - "The {zone} has been pushed past capacity — {volume} of {fluid} in a space that has made its objections clear. The surface gives where it can."
    - "Overfull: {target}'s {zone} cannot maintain comfortable containment at this volume. The {fluid} presses outward insistently. The shape of it shows."
    - "The capacity of {target}'s {zone} was exceeded some volume ago. The {fluid} fills it past its limit, the pressure constant and past negotiating."

  drain:
    - "The {fluid} drains from {target}'s {zone} in a controlled release — the pressure easing by degrees until the zone returns to its natural state."
    - "The volume clears from {target}'s {zone}. The fullness recedes, the {fluid} leaving behind only the relief of a return to baseline."
    - "Draining: the {fluid} exits {target}'s {zone} steadily, the pressure unwinding. The fullness retreats."
    - "The {zone} releases its contents — {fluid} drawing away from {target} until the insistent fullness is simply gone."

# ---------------------------------------------------------------------------
