# ---------------------------------------------------------------------------

insemination:
  machine:
    - "The machine delivers its load — {volume} of {fluid} deposited into {target}'s {zone} in a single, unhurried release. The chamber empties. The zone does not."
    - "The insemination cycle completes: {fluid} routed directly into {target}'s {zone}. The volume is {volume}. The machine logs it and resets."
    - "A deep internal warmth as the machine deposits into {target}'s {zone} — {volume} of {fluid}, delivered without ceremony, now resident."
    - "The deposit lands: {volume} of {fluid} inside {target}'s {zone}. The machine has completed its function. What remains, stays."

  bank:
    - "{actor}'s contribution reaches {target}'s {zone} — {volume} of {fluid}, drawn from storage and delivered warm. The origin is specific. So is the destination."
    - "The banked deposit from {actor} reaches {target}'s {zone}: {volume} of {fluid}, intimate even at remove. The warmth of it is immediate."
    - "{volume} of {actor}'s {fluid} is released into {target}'s {zone}. The source was stored. The delivery is direct."
    - "The machine routes {actor}'s banked {fluid} into {target}'s {zone} — {volume}, a specific contribution from a specific source, now held inside."

  random:
    - "An anonymous contribution deposits into {target}'s {zone} — {volume} of {fluid} from storage, the source unspecified. What matters is that it arrives."
    - "The random selection resolves to {volume} of {fluid}, deposited into {target}'s {zone}. The origin is undisclosed. The volume is not."
    - "{volume} of {fluid} from the anonymous bank pool reaches {target}'s {zone}. Whatever it came from, it's there now."
    - "Drawn from storage at random and delivered: {volume} of {fluid} inside {target}'s {zone}. The source is irrelevant. The presence is not."

# ---------------------------------------------------------------------------
# Knot mechanic messages
# trigger: room-visible when knot engages — tokens: {actor} {target} {zone}
# held:    private to target when withdrawing while tied — tokens: {actor} {duration}
# release: room-visible when tie expires — tokens: {actor} {target}
# ---------------------------------------------------------------------------

knot:
  trigger:
    - "{actor} and {target} are tied — the knot has engaged at {actor}'s {zone}. Withdrawal is not immediately possible."
    - "The knot locks — {actor} and {target} held together. Neither is going anywhere for the moment."
    - "A sharp catch, and then the tie is established. {actor} and {target} are locked. The knot is not interested in urgency."
    - "{actor}'s knot engages — {target} held fast, {actor} equally so. The tie has set. It will release in its own time."

  held:
    - "The knot holds. You and {actor} are tied — withdrawal isn't possible until the tie releases naturally. ({duration}s remaining)"
    - "You try to withdraw. The knot has other ideas. You and {actor} stay where you are for now. ({duration}s remaining)"
    - "The tie is firm. You aren't going anywhere yet, and neither is {actor}. The knot will release when it's ready. ({duration}s remaining)"
    - "The knot has you. Withdrawal isn't an option right now — the tie will release on its own. ({duration}s remaining)"

  release:
    - "The knot between {actor} and {target} releases naturally — the tie easing until the connection breaks. Both are free."
    - "The tie lets go. {actor} and {target} are free to separate."
    - "The knot releases. {actor} and {target} are no longer held — the tie has run its course."
    - "A slow release as the knot between {actor} and {target} eases. The tie is done."

# ---------------------------------------------------------------------------
# Cycle machine phase messages — all room-visible.
# Tokens: {target} = target RP name, {cycle} = cycle number
# Phases: restrain / rest / boost / end
# ---------------------------------------------------------------------------

cycle_machine:
  restrain:
    - "The machine engages — restraints close around {target}, securing them in place. The cycle is beginning."
    - "Restraints extend from the machine and lock around {target}. The cycle has begun. {target} is not going anywhere."
    - "The machine's harness engages — {target} held firmly as the cycle initialises. Movement is not currently on the table."
    - "A mechanical click as the restraints find {target} and close. The machine has them now. The cycle is starting."

  rest:
    - "The machine enters rest phase — a brief interval between cycles. {target} remains secured. The next cycle begins shortly."
    - "Rest phase after cycle {cycle}. The machine holds {target} in place and waits. It will resume."
    - "Cycle {cycle} complete. The machine drops to its rest interval — {target} still in the harness, the equipment cooling before the next sequence."
    - "The machine rests. {target} waits with it. Cycle {cycle} is logged. The next will begin in its own time."

  boost:
    - "The machine administers its growth compound to {target} — a deep internal warmth, brief and specific. The effect is permanent."
    - "A dose from the machine's internal serum supply reaches {target}. The compound has been delivered. The changes are not reversible."
    - "The growth phase: the machine administers to {target}. The serum is inside. What it does, it does permanently."
    - "Internal administration — the machine delivers its compound to {target}. Quiet, efficient, and not something that will be undone."

  end:
    - "The machine cycle ends for {target} — restraints releasing, the equipment powering down. The session is complete."
    - "Cycle end: the machine releases {target} from the harness and powers down. What happened, happened."
    - "The machine completes its final phase and releases {target}. The cycle is over. The restraints open."
    - "The machine stands down — {target} released from the harness, the cycle finished. The room is quieter for it."

# ---------------------------------------------------------------------------
# Extended size_ambient tiers for extreme testes sizes (34.0+)
# Insert these into the size_ambient.tiers list above min_size: 38.0
# (The loader sorts descending, so ordering here is just for readability)
# ---------------------------------------------------------------------------

testes_size_ambient:
  tiers:
    - min_size: 50.0   # Beyond All Frameworks
      messages:
        - "The concept of carrying them has stopped making linguistic sense. Your body reorganised itself around them so long ago that you have forgotten what the alternative felt like. They are the situation."
        - "Every room you have ever entered has been entered by them first. The scale is not a descriptor anymore. It is a fact of geometry."
        - "Beyond All Frameworks is accurate. You have moved past the point where language applies and into the territory where physics is having a quiet conversation with itself about you."

    - min_size: 46.0   # A Continent of Intent
      messages:
        - "They precede you into every space by a margin that has stopped being metaphorical. Your body is organised entirely around them. The weight is tectonic."
        - "A Continent of Intent. The description has become literal. The mass of what you carry is a matter of geography."
        - "You have not experienced your own center of gravity for some time. Everything your body does is a negotiation with the weight. The weight is winning, comfortably."

    - min_size: 42.0   # Cosmologically Impractical
      messages:
        - "Cosmologically Impractical is the label. Your body chose to continue existing around them rather than the other way around. This was not a negotiation."
        - "The mass of what you carry has long since resolved from a physical sensation into a permanent condition of existing. Every movement is a structural decision."
        - "They are simply the dominant fact of your physical reality. The weight, the volume, the presence — all of it constant, total, and entirely in charge of how you navigate space."

    - min_size: 38.0   # Gravitationally Concerning
      messages:
        - "Gravitationally Concerning has stopped being hyperbole. The mass they carry is a real force in any room you enter. Objects nearby don't bend toward them — but your posture has been bending toward them for a long time."
        - "At this scale they are not a feature of your body — they are the primary physical fact of it. Everything else is arranged around them."
        - "The weight is its own weather system. You stopped negotiating with it some time ago and started simply existing within it."

    - min_size: 34.0   # Architecturally Significant
      messages:
        - "Architecturally Significant has taken on a load-bearing quality. No position, no doorway, no movement fails to account for them first. They arrive before you do."
        - "They are a structural consideration. The weight is total and the presence is constant and your body has reorganised itself around them as a baseline it no longer remembers choosing."
        - "Every room you enter is immediately a smaller room. The weight arrives with you and stays at the centre of everything your body does."

# ---------------------------------------------------------------------------
