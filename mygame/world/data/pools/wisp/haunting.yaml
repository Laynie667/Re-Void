# world/data/pools/wisp/haunting.yaml
# Ambient lines contributed by invisible wisps.
# These read as room atmosphere to IC characters.
# They should not obviously announce a wisp's presence.

general:
  - "The candle nearest the window gutters once, 
     for no apparent reason, and steadies."
  - "A faint warmth — or a faint cool — in one corner 
     of the room that wasn't there a moment ago."
  - "The air shifts slightly. Nobody moved."
  - "Something at the edge of the light — 
     gone when you look directly at it."
  - "A sound that wasn't quite a sound. The room settles."
  - "The quality of the silence changes briefly 
     and then returns to what it was."
  - "One of the shadows moves and then doesn't."

mood_curious:
  - "The impression of attention — specific, directed — 
     from somewhere in the room that's otherwise empty."
  - "The sensation of being watched, pleasantly, 
     from somewhere you can't quite identify."
  - "Something in the room is paying attention. 
     You can't say what."

mood_melancholy:
  - "The room is slightly colder in one area 
     than it should be given the fire."
  - "A heaviness — not oppressive, just present — 
     in one part of the space."
  - "The light in one corner is slightly less than 
     it should be."

mood_playful:
  - "The flame on the nearest candle does something 
     that flames don't usually do and then doesn't do it again."
  - "A warmth moves through the space — briefly, 
     in an irregular path."
  - "Something brushes the edge of your attention 
     and is gone before you can place it."

mood_bold:
  - "The light in the room is slightly brighter for a moment. 
     The sources haven't changed."
  - "An energy in the space — present, not attributable 
     to anyone in the room."

mood_serene:
  - "The room feels, for a moment, like it has 
     more time in it than it did."
  - "A stillness settles into the space from somewhere."

mood_intense:
  - "The shadows deepen briefly in one part of the room."
  - "A pressure — slight, sourceless — in the air."

mood_curious_room_specific:
  bar:
    - "The glass on the counter shifts half an inch 
       for no apparent reason."
    - "The bottles behind the bar catch the light 
       differently for a moment."
  fireplace:
    - "The fire reaches toward something and settles."
    - "A spark rises from the fire and goes out 
       higher than sparks usually go."
