          |cpresence|n, or |cconsent|n." A pause. "Or |wask the Mirror about |chelp|n and I
          will give you everything at once."

          "When you are satisfied with what you see — tell me you are |wready|n."

      chargen:
        type: prose
        response: |
          "The checklist," the Mirror says. "Use |wchargen|n to see it — everything that needs
          setting before you step into the world."

          "The required ones: your name, your description, your pronouns. The optional ones
          still matter — they are just not enforced." A pause. "But I will enforce some of them
          before I let you leave."

          "Work through the list. Ask me about anything — |cname|n, |cdesc|n, |cpronouns|n,
          |czones|n, |cplace|n, |cwardrobe|n, |cconsent|n. Or |wask the Mirror about |chelp|n
