          might want to do."

          "Some require consent flags. Eight require explicit in-scene permission — those
          send a request to the target first and do not fire until they reply. |wask Wren
          about |cpermit|n if you need to understand that part."

      socials:
        type: prose
        response: |
          "The social emote library," Wren says. "Type |wsocials|n to see the full list.
          Most of them work without a target — they address the room. Most also accept a target."

          She demonstrates without ceremony: she nods at you. One small, precise downward
          motion of her head.

          "That was |wnod|n. It can also be |wnod |ccompanion|n, or |wnod |c<player name>|n.
          The library is large. |wsmile|n. |wbow|n. |wtouch|n. |wlean|n. Most things you
          might want to do."

          "Some require consent flags. Eight require explicit in-scene permission — those
          send a request to the target first and do not fire until they reply. |wask Wren
          about |cpermit|n if you need to understand that part."

      permit:
        type: prose
        response: |
          "The permit system," Wren says. "Eight emotes require explicit permission before
          they fire. Not a category — a specific act, from a specific person. |wundress|n.
          |wblindfold|n. |wgag|n. |wtieup|n. |wstrip|n. |wexamclose|n. |wrestrain|n.
          |wclaimmark|n."

          "When you attempt one and the target hasn't enabled it: the emote does not fire.
          You see a message. Nothing happens until they allow it."

          "The target grants it by turning on their consent flag for that act — or by
          allowing you specifically. |wpermit |c<name> <emote>|n grants one person one act.
          |wpermit |c<name> all|n grants everything at once. To take it back:
          |wpermit/revoke |c<name> <emote>|n or |wpermit/revoke |c<name> all|n.
          |wpermit/list|n shows what you have currently granted others."

          A pause. "Those eight emotes also require proximity — run |wbeside |ccompanion|n
          before you try one. Grants are persistent until revoked."

          "The system does not stop you from asking. It stops you from acting without
          permission. That is the point."

      place:
        type: prose
        response: |
          "Same as placing on yourself," Wren says, "but with a target. |wplace |ccompanion
          |c<zone>|n|w = |c<name>/<description>|n."

          She glances at the companion.

          "For example: |wplace |ccompanion |cneck|n|w = |cchoker/A thin cord of dark ribbon,
          tied close.|n" A pause. "Name. Slash. Description. The zone must exist on the target.
          If you do not know the zone names, |wexamine |ccompanion|n lists them."

          "Put something on it. It does not have to be interesting. It has to be done."

      _place_complete:
        type: prose
        response: |
          Wren is already on her feet.

          She crosses to you in three efficient steps — not fast, just purposeful, the walk
          of someone who has already decided what happens next. Her hand finds your shoulder
          and turns you toward the door with a pressure that is not rough but leaves no
          room for discussion.

          "Done," she says. "You're done."

          She walks you to the threshold. The door is open. The space beyond it waits.

          "Go." Her hand leaves your shoulder. "You know more than you did. That's the
          point of this room."

          She is already turning back to her desk before you've moved.

      consent:
        type: prose
        response: |
          "Consent flags determine what others can do with your character," Wren says. "You
          set them. You control them."

          "|wconsent|n — view your current flags."

          "Two ways to allow or disallow. No name — it applies globally, to everyone.
          With a name — it applies to that person only, overriding the global setting."

          "|wconsent allow |c<type>|n — enable for everyone.
          |wconsent allow |c<type> <name>|n — enable for one person even if globally off.
          |wconsent disallow |c<type>|n — disable for everyone.
          |wconsent disallow |c<type> <name>|n — block one person even if globally on.
          |wconsent unblock |c<type> <name>|n — remove their override, fall back to global.
          Use |call|n in place of a type to affect everything at once."

          "Content tiers: |ccasual|n, |cintimate|n, |cmature|n, |cbdsm|n, |clead_follow|n,
          |crestraint|n, |cplock|n."
          "Specific acts: |cundress|n, |cblindfold|n, |cgag|n, |ctieup|n, |cstrip|n,
          |cexamclose|n, |wrestrain|n, |cclaimmark|n."

          She looks at you. "The companion has some flags set. You will find out which ones
          when you try something that requires them. That is the point of the exercise."

          "And |wsafeword|n — always in your pocket, no explanation required. You already
          know this from Sable."

      help:
        type: prose
        response: |
          "Short version," Wren says.

          "|wexamine |ccompanion|n — see zone depth and visibility.
          |wapproach|n / |wbeside |ccompanion|n — proximity unlocks more.
          |wplace |ccompanion <zone>|n = |c<name>/<desc>|n — put something on it.
          |wflist |ccompanion|n — see what's on it.
          |wsocials|n — full emote list.
          |wpermit |c<name> <emote|all>|n — grant persistent permission for specific acts.
          |wpose |c<text>|n — third person action.
          |wconsent allow/disallow <type|all> [name]|n — your flags, global or per-person."

          "For more detail: |wask Wren about |cexamine|n, |capproach|n, |cplace|n,
          |cemote|n, |cpermit|n, |cconsent|n, or |ccompanion|n."

          She picks up her pen.

          "When you have placed something on the companion and used at least one social emote:
          tell me you are |wready|n."

