      tokens:
        type: prose
        response: |
          "Tokens," the Mirror says. "A way to make your description responsive."

          "When you write |w{zone:hair}|n inside your |wsetdesc|n text, it becomes a
          placeholder. Every time someone reads your description, the placeholder resolves
          to whatever is currently true about that zone."

          "If your hair zone reads |cdark, loosely gathered at the nape|n and nothing is
          placed there, the token renders as exactly that. If you then place a braid — the
          token renders as the braid. Remove it, and the zone description returns."

          "Two modes for placed items. The default places something |won|n the zone — it
          replaces what was there. |wplace/in|n places something |win|n the zone — the
          original desc stays and the item appends after a dash."

          "The difference: |wplace me hair = braid/a single plait drawn over one shoulder|n
          replaces your hair desc entirely with the braid. |wplace/in me hair = pin/a small
          silver pin at the temple|n keeps the hair desc and adds the pin after it."

          "Write your zone descriptions as fragments, not sentences. |cDark, loosely
          gathered at the nape|n — not |cHer hair is dark and loosely gathered.|n The
          surrounding prose in your desc provides the sentence. The zone fills in the
