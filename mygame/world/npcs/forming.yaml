  # ---------------------------------------------------------------------------
  # Space 4: The Mirror — the Mirror NPC
  # ---------------------------------------------------------------------------
  - id: "forming_mirror"
    name: "the Mirror"
    tier: 2
    location: "#6"   # Space 4: The Mirror

    desc:
      physical: >
        It is not a person and does not pretend to be. It is a surface that has been waiting
        to reflect you specifically. The attention it pays is complete and uncomplicated —
        it wants nothing except to show you yourself, accurately, in full.
      mood: "attentive, unhurried, entirely focused"
      presence: "The Mirror holds your reflection with particular attention."

    react_to_say: false

    ambient:
      base:
        - "The Mirror shifts its attention slightly — not away from you, just to a different angle of you."
        - "The surface brightens by a fraction. Responding to something. You're not sure what."
        - "Your reflection in the Mirror looks, very briefly, like the version of you that knows what it's doing."

    zones:
      surface:
        nude: "Reflective without being passive about it. The surface holds your shape with particular attention — not the flat accuracy of glass, but the focused regard of something that is actively engaged with what it's seeing. Your reflection in it is real but provisional."
        visibility: look
        parent: null
      reflection:
        nude: "What the Mirror shows you is almost you. The shape is right. The proportions, the basic facts. The details are waiting — present as spaces, empty with a specific quality of expectation."
        visibility: examine
        parent: null

    triggers:
      _arrive:
        type: prose
        response: |
          The Mirror takes you in before you've finished arriving.

          "Almost," it says. The voice comes from the surface — from everywhere the surface is.
          "You are almost visible. The shape of you is here." A brief shift in the reflection.
          "The rest is what we're about to do."

          A pause with the quality of something that has been waiting a long time and does not
          mind having waited.

          "Start with |wchargen|n — that will show you a checklist of what needs setting. Work
          through it, and ask me about anything you are unsure of. |wask the Mirror about
          |cname|n, |cdesc|n, |cpronouns|n, |czones|n, |cplace|n, |cwardrobe|n, or |cconsent|n.
          Or |wask the Mirror about |chelp|n for the full list."

          The surface stills. "I am not going anywhere."

      greet:
        type: prose
        response: |
          "Hello," the Mirror says, with the quality of a surface acknowledging that it sees you.

          "You are here to become something specific. That is what I am here to help you do."

          A beat. "Run |wchargen|n to see your checklist. Then ask me about whatever you need
          — |cname|n, |cdesc|n, |cpronouns|n, |cspecies|n, |czones|n, |cplace|n, |cwardrobe|n,
          |cpresence|n, or |cconsent|n." A pause. "Or |wask the Mirror about |chelp|n and I
          will give you everything at once."

          "When you are satisfied with what you see — tell me you are |wready|n."

      hello:
        type: prose
        response: |
          "Hello," the Mirror says, with the quality of a surface acknowledging that it sees you.

          "You are here to become something specific. That is what I am here to help you do."

          A beat. "Run |wchargen|n to see your checklist. Then ask me about whatever you need
