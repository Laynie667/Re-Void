      flist:
        type: prose
        response: |
          "Your freeform items," the Mirror says. "|wflist|n shows everything currently placed
          on you — what zone it's on, what it's called, what it looks like."

          "Use it to check your work after placing items. If something is wrong, |wunplace me
          <name>|n removes it."

      place:
        type: prose
        response: |
          "Clothing in this world is descriptive," the Mirror says. "You write what you are
          wearing and place it on yourself. The system tracks it. What you place becomes
          part of how you appear."

          "Use |wplace me <zone> = <name>/<description>|n. The name is a short reference
          label — one or two words. After the slash comes the description that others
          will actually read."

          A demonstration, unhurried:

          "|wplace me neck = collar/A simple silver collar, plain and close against the skin.|n"

          "The description reads as a sentence — or a fragment that could sit comfortably
          in a sentence. Think of how it might land in a room full of people scanning you.
          |xA leather jacket, worn soft with age.|n reads well. |xleather jacket thing|n
          does not."

          "Lead with what is visually distinct. Material, fit, detail, condition. The goal
          is a single clear impression, not a full inventory. If something has texture,
          color, or wear that matters — put that in. If it is plain, say it plainly."

          "A few more examples:"

          "|wplace me hair = pin/A small ivory pin, keeping a loose coil in place.|n"
          "|wplace me waist = belt/A wide leather belt, brass-buckled, cinched close.|n"
          "|wplace me hands = rings/Three plain silver bands, mismatched, worn low.|n"

          "Try placing something. When you have a few things on, ask me about |wflist|n
          to review them, then |wwardrobe|n to save your work."

      freeform:
        type: prose
        response: |
          "Clothing in this world is descriptive," the Mirror says. "You write what you are
          wearing and place it on yourself. The system tracks it. What you place becomes
          part of how you appear."

          "Use |wplace me <zone> = <name>/<description>|n. The name is a short reference
          label — one or two words. After the slash comes the description that others
