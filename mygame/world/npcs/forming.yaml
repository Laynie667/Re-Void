          |carms|n, |cgroin|n, |clegs|n — each with children beneath them. Head holds hair,
          face, and ears. Face holds eyes, lips, and mouth. Torso holds chest, back, shoulders,
          and so on. Use |wzone list|n to see the full tree."

          "Zone descriptions are brief and physical — just that part of the body, nothing more.
          They appear when someone examines you closely, or when someone looks at that zone
          directly with |wlook <name> <zone>|n."

          "For example: |wzone set hair = Dark, loosely pinned, a few strands escaping
          at the temples.|n"

          "Keep them short. One or two sentences at most. They are details, not paragraphs —
          the kind of thing someone notices when they're already looking carefully."

          "You can add more zones beneath any existing one. |wzone add groin/vulva type=both
          intimate|n adds a child zone under groin. Each parent in the path must already exist."

          "Ask me about |wplace|n when you're ready to start dressing."

