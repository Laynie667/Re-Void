      mood:
        type: prose
        response: |
          "Two parts," the Mirror says. "The mood tag — a single word for the internal state.
          And the mood tell — what that state looks like from outside."

          "|wsetmood <word>|n for the tag. |wsetmoodtell <text>|n for the physical tell —
          the specific thing someone sees in your face or body that communicates it."

          A pause. "The tell is more important. |cThe particular stillness of someone keeping
