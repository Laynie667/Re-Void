# The Forming — NPC Definitions
# Load with: npc loadall world/npcs
# Rooms built: #3 Before, #4 The Drift, #5 Almost, #6 The Mirror, #7 The Fitting
# Companion (forming_companion): #21 — built by world/build_forming.py
# All Forming NPCs use type: prose for triggers so responses emit as raw text.

npcs:

  # ---------------------------------------------------------------------------
  # Space 1: Before — The Witness
  # ---------------------------------------------------------------------------
  - id: "forming_witness"
    name: "the Witness"
    tier: 2
    location: "#3"   # Space 1: Before

    desc:
      physical: >
        They are indistinct at the edges in a way that reads as deliberate — not blurred,
        not absent, just not fully decided. Features that resolve into a general impression
        of attention. Eyes that are present. A mouth that rests near patience.
      mood: "settled, unhurried"
      presence: "A figure of composed stillness sits at the center, watching."

    ambient:
      base:
        - "The Witness turns something small in their hands — too small to make out, except that it catches light it shouldn't."
        - "The figure looks up briefly, as though they heard your name spoken somewhere far away."
        - "The Witness's stillness is the kind that comes from a very long practice of it."

    zones:
      face:
        nude: "Features that almost resolve — eyes that are clearly present, a mouth that rests near patience — but the precise details shift when looked at directly. Less blurred than uncommitted."
        visibility: look
        parent: head
      hands:
        nude: "Whatever they are holding is too small to make out. The hands themselves have the quality of things that have been very still for a very long time."
        visibility: examine
        parent: arms
      presence:
        nude: "The Witness occupies the center of the space with the quality of a fixed point — not heavy, not imposing, simply the thing everything else is relative to."
        visibility: look
        parent: null

    triggers:
      _arrive:
        type: prose
        response: |
          The figure at the center turns toward you without hurry.

          "Welcome," they say. The quality of it is matter-of-fact — neither warm nor cold, just
          certain. "Take a moment. This place has more in it than the first glance gives."

          A pause with the texture of patience. "Try |wlook at |cWitness|n — or the |cfloor|n,
          or the |clight|n. Some things only reveal themselves when you look more closely. And
          when you want to speak with me —" the faint quality of an invitation "— |wgreet
          |cWitness|n."

      greet:
        type: prose
        response: |
          "You came," they say. It isn't a question. "They all come eventually. Some of them stay."

          "I am the Witness. I watch arrivals. I answer questions when they are asked — and there
          is no wrong question here." A pause, unhurried. "Ask me |wask Witness about |cwhat you
          are|n, |cwhere you are|n, |cwho I am|n, |cwhy any of this|n, or |cwhat comes next|n.
          Ask about |cform|n if you want to understand what waits for you. Or simply tell me when
          you're ready."

      hello:
        type: prose
        response: |
          "You came," they say. It isn't a question. "They all come eventually. Some of them stay."

          "I am the Witness. I watch arrivals. I answer questions when they are asked — and there
          is no wrong question here." A pause, unhurried. "Ask me |wask Witness about |cwhat you
          are|n, |cwhere you are|n, |cwho I am|n, |cwhy any of this|n, or |cwhat comes next|n.
          Ask about |cform|n if you want to understand what waits for you. Or simply tell me when
          you're ready."

      what you are:
        type: prose
        response: |
          "Between," they say. "You know the feeling — the one just before you arrived? That is
          where you still are. Mostly."

          "This is The Forming. The place before the place. You are about to choose something,
          and I am here to make sure you understand what that means."

      where you are:
        type: prose
        response: |
          "Between," they say. "You know the feeling — the one just before you arrived? That is
          where you still are. Mostly."

          "This is The Forming. The place before the place. You are about to choose something,
          and I am here to make sure you understand what that means."

      what comes next:
        type: prose
        response: |
          "Alright," they say. "Concentrate now."

          They gesture — not toward a direction, because directions don't apply here, but toward
          a quality of the void that has thickened, gathered, become more of itself.

          "Go deeper into it until it becomes something more solid for you." The gesture
          lingers. "|wvoid|n, if you want the simplest word for it."

      what:
        type: prose
        response: |
          "Between," they say. "You know the feeling — the one just before you arrived? That is
          where you still are. Mostly."

          "This is The Forming. The place before the place. You are about to choose something,
          and I am here to make sure you understand what that means."

      where:
        type: prose
        response: |
          "Between," they say. "You know the feeling — the one just before you arrived? That is
          where you still are. Mostly."

          "This is The Forming. The place before the place. You are about to choose something,
          and I am here to make sure you understand what that means."

      here:
        type: prose
        response: |
          "Between," they say. "You know the feeling — the one just before you arrived? That is
          where you still are. Mostly."

          "This is The Forming. The place before the place. You are about to choose something,
          and I am here to make sure you understand what that means."

      who:
        type: prose
        response: |
          "The Witness," they say, without ceremony. "I watch arrivals. I have been here for —"
          a pause, "— a duration."

          "You may call me what you like. Names are something you carry after you leave here."

      why:
        type: prose
        response: |
          "Why are you here, or why does this place exist?" They seem genuinely curious which
          you meant.

          Without waiting: "You are here because you are not yet anything fixed. That is a rare
          state. Most things, once they begin, cannot easily return to the not-yet. You can. For
          a little while longer."

      form:
        type: prose
        response: |
          "Yes," they say. "That is what happens next."

          They settle more deliberately. "You will choose a form. The form you take shapes how
          this world meets you, and how you meet it. Details can change — but some things, once
          decided, carry weight."

          "When you're ready. There is no hurry here."

      body:
        type: prose
        response: |
          "Yes," they say. "That is what happens next."

          They settle more deliberately. "You will choose a form. The form you take shapes how
          this world meets you, and how you meet it. Details can change — but some things, once
          decided, carry weight."

          "When you're ready. There is no hurry here."

      become:
        type: prose
        response: |
          "Yes," they say. "That is what happens next."

          They settle more deliberately. "You will choose a form. The form you take shapes how
          this world meets you, and how you meet it. Details can change — but some things, once
          decided, carry weight."

          "When you're ready. There is no hurry here."

      help:
        type: prose
        response: |
          "The simplest things first," they say.

          "|wlook|n — shows you what's here. |wlook at |c<something>|n — shows you more.
          |wgreet |cWitness|n or |wask Witness about |c<topic>|n — how you speak to me."

          A pause. "When it is time to leave, the void itself is the way. |wvoid|n, or
          |wdeeper|n — either will carry you."

      ready:
        type: prose
        response: |
          "Alright," they say. "Concentrate now."

          They gesture — not toward a direction, because directions don't apply here, but toward
          a quality of the void that has thickened, gathered, become more of itself.

          "Go deeper into it until it becomes something more solid for you." The gesture
          lingers. "|wvoid|n, if you want the simplest word for it."

      begin:
        type: prose
        response: |
          "Alright," they say. "Concentrate now."

          They gesture — not toward a direction, because directions don't apply here, but toward
          a quality of the void that has thickened, gathered, become more of itself.

          "Go deeper into it until it becomes something more solid for you." The gesture
          lingers. "|wvoid|n, if you want the simplest word for it."

      next:
        type: prose
        response: |
          "Alright," they say. "Concentrate now."

          They gesture — not toward a direction, because directions don't apply here, but toward
          a quality of the void that has thickened, gathered, become more of itself.

          "Go deeper into it until it becomes something more solid for you." The gesture
          lingers. "|wvoid|n, if you want the simplest word for it."

      continue:
        type: prose
        response: |
          "Alright," they say. "Concentrate now."

          They gesture — not toward a direction, because directions don't apply here, but toward
          a quality of the void that has thickened, gathered, become more of itself.

          "Go deeper into it until it becomes something more solid for you." The gesture
          lingers. "|wvoid|n, if you want the simplest word for it."

  # ---------------------------------------------------------------------------
  # Space 2: The Drift — Lark
  # ---------------------------------------------------------------------------
  - id: "forming_lark"
    name: "Lark"
    tier: 2
    location: "#4"   # Space 2: The Drift

    desc:
      physical: >
        Warm amber, slightly larger than the other wisps drifting through, with the particular
        settled radiance of something that has been a light for a long time. At its edges —
        barely audible, just past the threshold of imagining — a faint sound. Almost musical.
        Almost not.
      mood: "fond, unhurried, slightly delighted"
      presence: "A warm amber light hovers nearby, trailing something almost like music at its edges."

    ambient:
      base:
        - "Lark drifts in a slow idle circle, the way some people pace while they think."
        - "The amber light brightens briefly — the wisp equivalent of a smile, you suspect."
        - "Lark holds very still for a moment, then resumes moving. Whatever it was, it passed."

    zones:
      light:
        nude: "Warm amber, slightly larger than the other wisps in the drift. At its edges — if light can have edges — a quality that is almost but not quite sound. It has the settled radiance of something that has been this for a long time and has made peace with that."
        visibility: look
        parent: null
      presence:
        nude: "Lark holds the specific warmth of something that enjoys existing. Not radiantly cheerful — more the comfortable glow of a thing that has sorted itself out and is glad."
        visibility: examine
        parent: null

    triggers:
      _arrive:
        type: prose
        response: |
          The amber light turns toward you before you've fully arrived, and you get the
          impression — somehow — that it's smiling.

          "Oh, a new one," it says. The voice is warm, slightly amused by something pleasant.
          "Hello, you. Welcome to what you are."

          A pause that feels fond. "You're a wisp. We all are, until we decide to be something
          more solid — and even then, most of us keep it. It's useful. It's ours."

          "I'm Lark. I've been a wisp longer than I've been anything else." A small idle drift.
          "|wlook at |cLark|n, if you want to see what identity looks like on someone who's had
          a while to settle into it. And |wask Lark about |cwisp|n when you're ready to
          understand what you are."

      greet:
        type: prose
        response: |
          "Hello again," Lark says, warmly. "Look around — these are your people, more or
          less. All lights. All particular. All going somewhere eventually."

          "You'll want to know what you look like to the rest of us. |wask Lark about |cdesc|n
          or |ccolor|n — that's where most people start."

      hello:
        type: prose
        response: |
          "Hello again," Lark says, warmly. "Look around — these are your people, more or
          less. All lights. All particular. All going somewhere eventually."

          "You'll want to know what you look like to the rest of us. |wask Lark about |cdesc|n
          or |ccolor|n — that's where most people start."

      wisp:
        type: prose
        response: |
          "A wisp," Lark says, with the ease of something said many times without getting tired
          of it. "A presence without a body. You can move through spaces, observe, communicate
          — other wisps can see you, and certain characters will notice you too, depending on
          where you are."

          "You're not nothing. You're just not solid yet." A beat, warm. "Solid comes later.
          There's no rush."

          "What you can do right now is decide what you look like to the rest of us." An idle
          drift. "Ask me about |cdesc|n to start with your description, |ccolor|n for the color
          of your light, |csize|n for how much space you take up, or |csignature|n for the
          impression you leave when you pass through a room. Or |chelp|n if you want all of it
          at once."

          "When you're happy with how you look — |wwpreview|n to check it, then |wvoid|n to
          move on."

      what:
        type: prose
        response: |
          "A wisp," Lark says, with the ease of something said many times without getting tired
          of it. "A presence without a body. You can move through spaces, observe, communicate
          — other wisps can see you, and certain characters will notice you too, depending on
          where you are."

          "You're not nothing. You're just not solid yet." A beat, warm. "Solid comes later.
          There's no rush."

          "What you can do right now is decide what you look like to the rest of us." An idle
          drift. "Ask me about |cdesc|n to start with your description, |ccolor|n for the color
          of your light, |csize|n for how much space you take up, or |csignature|n for the
          impression you leave when you pass through a room. Or |chelp|n if you want all of it
          at once."

          "When you're happy with how you look — |wwpreview|n to check it, then |wvoid|n to
          move on."

      desc:
        type: prose
        response: |
          "Your wisp description," Lark says. "The short impression of what you look like to
          everyone else in the drift. Not a body — just a quality. A color, a texture, a sound,
          a feeling. Whatever fits."

          "Use |wwdesc|n to write it. A line or two. You can change it anytime — this is not a
          permanent decision. Just a starting point."

      wdesc:
        type: prose
        response: |
          "Your wisp description," Lark says. "The short impression of what you look like to
          everyone else in the drift. Not a body — just a quality. A color, a texture, a sound,
          a feeling. Whatever fits."

          "Use |wwdesc|n to write it. A line or two. You can change it anytime — this is not a
          permanent decision. Just a starting point."

      description:
        type: prose
        response: |
          "Your wisp description," Lark says. "The short impression of what you look like to
          everyone else in the drift. Not a body — just a quality. A color, a texture, a sound,
          a feeling. Whatever fits."

          "Use |wwdesc|n to write it. A line or two. You can change it anytime — this is not a
          permanent decision. Just a starting point."

      color:
        type: prose
        response: |
          "The color of your light," Lark says. "It shows when you speak, when you drift, when
          someone looks at you. It's the fastest way to be recognizable."

          "Use |wwcolor|n and give it a name. |ccrimson|n, |cpale blue|n, |cgold|n, |cthe
          particular grey of early morning|n — whatever feels like you. Evocative language
          works."

      wcolor:
        type: prose
        response: |
          "The color of your light," Lark says. "It shows when you speak, when you drift, when
          someone looks at you. It's the fastest way to be recognizable."

          "Use |wwcolor|n and give it a name. |ccrimson|n, |cpale blue|n, |cgold|n, |cthe
          particular grey of early morning|n — whatever feels like you. Evocative language
          works."

      size:
        type: prose
        response: |
          "How much space you take up," Lark says. "Some wisps are very small and very focused.
          Some are large and diffuse. Neither is better — just a different quality of presence."

          "|wwsize|n, then a word or phrase. |csmall|n, |cvast|n, |ctinier than most|n —
          describe it however you like."

      wsize:
        type: prose
        response: |
          "How much space you take up," Lark says. "Some wisps are very small and very focused.
          Some are large and diffuse. Neither is better — just a different quality of presence."

          "|wwsize|n, then a word or phrase. |csmall|n, |cvast|n, |ctinier than most|n —
          describe it however you like."

      signature:
        type: prose
        response: |
          "The line that follows you," Lark says. "An ambient impression — what people notice
          when you drift through a room without speaking. Some wisps have a sound. Some have a
          smell. Some have a feeling, like pressure or warmth or the specific quality of being
          watched by something that wishes you well."

          "|wwsignature|n. One line, evocative. Something that's distinctly yours — not what
          you look like, but what you leave behind when you pass through."

      wsignature:
        type: prose
        response: |
          "The line that follows you," Lark says. "An ambient impression — what people notice
          when you drift through a room without speaking. Some wisps have a sound. Some have a
          smell. Some have a feeling, like pressure or warmth or the specific quality of being
          watched by something that wishes you well."

          "|wwsignature|n. One line, evocative. Something that's distinctly yours — not what
          you look like, but what you leave behind when you pass through."

      preview:
        type: prose
        response: |
          "Once you've set a few things, |wwpreview|n will show you how you appear to everyone
          else in the drift. It's useful to check before you go somewhere you care about."

          A fond drift. "Some wisps spend a long time on it. That's not a flaw. When you're
          satisfied — |wvoid|n moves you on to the next space."

      wpreview:
        type: prose
        response: |
          "Once you've set a few things, |wwpreview|n will show you how you appear to everyone
          else in the drift. It's useful to check before you go somewhere you care about."

          A fond drift. "Some wisps spend a long time on it. That's not a flaw. When you're
          satisfied — |wvoid|n moves you on to the next space."

      character:
        type: prose
        response: |
          "Later," Lark says, not unkindly. "You'll make a character — a real body, a name, a
          face, a history you choose. That's what the rest of The Forming is for."

          "But your wisp comes first. Your account is your wisp. Your character is something
          you put on — and take off, when you need to come back to yourself." A pause. "A lot
          of people find that useful. The coming back."

      body:
        type: prose
        response: |
          "Later," Lark says, not unkindly. "You'll make a character — a real body, a name, a
          face, a history you choose. That's what the rest of The Forming is for."

          "But your wisp comes first. Your account is your wisp. Your character is something
          you put on — and take off, when you need to come back to yourself." A pause. "A lot
          of people find that useful. The coming back."

      help:
        type: prose
        response: |
          "Right," Lark says. "The things you can do as a wisp:"

          "|wwdesc|n — what you look like to others. |wwcolor|n — the color of your light.
          |wwsize|n — how much space you take. |wwsignature|n — the impression you leave when
          you pass through a room."

          "None of it permanent. All of it yours." A small idle drift. "When you're done
          exploring — |wvoid|n moves you on."

      ready:
        type: prose
        response: |
          "Already?" Lark sounds pleased rather than surprised. "Good instinct."

          The amber light drifts toward one edge of the space where the drift has thinned,
          pointing somewhere with its quality of attention rather than with any gesture.

          "The next space gets more specific. You're going to start choosing things that last."
          A warm, brief brightening. "You're doing well. |wvoid|n when you're ready."

      next:
        type: prose
        response: |
          "Already?" Lark sounds pleased rather than surprised. "Good instinct."

          The amber light drifts toward one edge of the space where the drift has thinned,
          pointing somewhere with its quality of attention rather than with any gesture.

          "The next space gets more specific. You're going to start choosing things that last."
          A warm, brief brightening. "You're doing well. |wvoid|n when you're ready."

      continue:
        type: prose
        response: |
          "Already?" Lark sounds pleased rather than surprised. "Good instinct."

          The amber light drifts toward one edge of the space where the drift has thinned,
          pointing somewhere with its quality of attention rather than with any gesture.

          "The next space gets more specific. You're going to start choosing things that last."
          A warm, brief brightening. "You're doing well. |wvoid|n when you're ready."

  # ---------------------------------------------------------------------------
  # Space 3: Almost — Sable
  # ---------------------------------------------------------------------------
  - id: "forming_sable"
    name: "Sable"
    tier: 2
    location: "#5"   # Space 3: Almost

    desc:
      physical: >
        Dark-haired and moderate in most physical ways, except for the quality of their
        attention, which is absolute. They carry themselves with the ease of someone who has
        been in far stranger places than this one and found them interesting.
      mood: "present, dry, genuinely interested"
      presence: "A person — actually, unmistakably a person — leans against the almost-wall, watching with calm curiosity."

    ambient:
      base:
        - "Sable turns a small object over in one hand — something you can't quite make out — then stills."
        - "They glance toward the almost-walls with the expression of someone checking on something that's slowly improving."
        - "Sable exhales quietly. It is such a specific, bodily thing that it's almost startling in this place."

    react_to_say: true
    parrot_responses:
      - '"{text}," Sable echoes back, matching your cadence with mild precision. They look faintly entertained. "That is the |wsay|n command. It sounds exactly like you, which is the point. Try |wpose|n next — that is the third person version. When you have done both, |wask Sable about |cdesc|n."'
      - 'Sable tilts their head. "{text}," they repeat, with the quality of someone tasting a phrase. A beat. "Good. Now — same thought, |wpose|n it. Write what you are doing when you say it. That is how this world actually reads. Then |wask Sable about |cdesc|n and we will get into the real work."'
      - '"Oh, we are saying things," Sable says, pleased. "{text}." They nod once, as if approving of the attempt. "|wsay|n is your voice in the room. |wpose|n is your body. You will need both. Once you have tried them — |wask Sable about |cdesc|n."'
      - '"{text}," Sable repeats back, perfectly. A small, dry smile. "Yes. That worked. Welcome to verbal communication." They gesture, casual. "Now try |wpose|n — write what you are doing in third person. |c{name} reaches for something|n. Then ask me about |cdesc|n."'
      - 'Sable pauses in whatever they were doing. "{text}," they echo, with the quality of someone who found this word choice personally interesting. "Valid. Now |wpose|n it — give it a body. And when you are done exploring those two, |wask Sable about |cdesc|n."'

    zones:
      face:
        nude: "Not remarkable from a distance — dark eyes, particular features that become specific on close inspection rather than immediately distinctive. The kind of face that rewards attention."
        visibility: look
        parent: head
      hair:
        nude: "Dark, simple, worn in whatever way required the fewest decisions. Practical rather than styled."
        visibility: examine
        parent: head
      hands:
        nude: "Still. The hands of someone who has learned to keep them that way — not fidgeting, not purposefully placed, just at rest. You notice this because you don't have hands yet."
        visibility: examine
        parent: arms

    triggers:
      _arrive:
        type: prose
        response: |
          The person pushes off the wall when you arrive. Not urgently — just the way people
          move when they've been waiting and the thing they were waiting for has shown up.

          "There you are," they say. "I'm Sable."

          They let that sit for a moment — the simple fact of a name, a voice, the way they
          take up space.

          "You've done the wisp part, I take it. Good. This next bit is different." They look
          at you steadily. "You're about to get a body. I want you to understand what that
          means before you walk into the Mirror."

          A pause, not unkind. "|wlook at |cSable|n, if you want. Then |wgreet |cSable|n, and
          we'll get into it."

      greet:
        type: prose
        response: |
          "Already handled," Sable says, mildly amused. "But yes — |wgreet|n is how you open
          a conversation with someone who hasn't introduced themselves yet. I have, so now you
          can just |wsay|n things."

          A small gesture, an invitation. "Try it. Say something. Doesn't matter what — I want
          you to see how the command lands. Then try |wpose|n — same idea, third person."

          "After that, ask me about |cdesc|n. That's where your character actually starts."

      hello:
        type: prose
        response: |
          "Already handled," Sable says, mildly amused. "But yes — |wgreet|n is how you open
          a conversation with someone who hasn't introduced themselves yet. I have, so now you
          can just |wsay|n things."

          A small gesture, an invitation. "Try it. Say something. Doesn't matter what — I want
          you to see how the command lands. Then try |wpose|n — same idea, third person."

          "After that, ask me about |cdesc|n. That's where your character actually starts."

      say:
        type: prose
        response: |
          "|wsay <text>|n — your voice into the room," Sable says. "Spoken, in the moment,
          out loud. Everyone present hears it."

          "The partner to it is |wpose|n. Third person — it writes what your body does.
          '|c{name} reaches for something.|n' '|c{name} goes quiet.|n'" They tilt their
          head. "Say and pose. Those two are most of what you'll use."

      pose:
        type: prose
        response: |
          "Third person," Sable says. "You're always the author, but in the world you're also
          the character. |wpose <action>|n — or |wemote|n, same thing — writes the action with
          your name at the front."

          "The important thing: you're writing a character who happens to be you. Or whoever
          you decide to be." A beat. "That distinction matters more than it sounds like it
          should."

      emote:
        type: prose
        response: |
          "Third person," Sable says. "You're always the author, but in the world you're also
          the character. |wpose <action>|n — or |wemote|n, same thing — writes the action with
          your name at the front."

          "The important thing: you're writing a character who happens to be you. Or whoever
          you decide to be." A beat. "That distinction matters more than it sounds like it
          should."

      desc:
        type: prose
        response: |
          "Start here," Sable says. "Your physical description — the permanent body underneath
          everything else. What you look like before anything else is applied."

          "Use |wsetdesc <text>|n. Write it in third person, present tense — as if someone
          else is looking at you. You have a lot of room. Use it."

          They pause. "Don't try to write everything. Start with: what do you look like from
          across the room? Let the rest come from the details."

          "When you've written it — ask me about |cpresence|n."

      setdesc:
        type: prose
        response: |
          "Start here," Sable says. "Your physical description — the permanent body underneath
