<!-- ============================================================
     Re:Void — World Stats Widget
     ============================================================ -->
<div class="rv-stat-card">
  <h5>World Stats</h5>
  <ul>
    <li>
      <span class="rv-stat-name">Rooms</span>
      <span class="rv-stat-val">{{ num_rooms|default:"0" }}</span>
    </li>
    <li>
      <span class="rv-stat-name">Exits</span>
      <span class="rv-stat-val">{{ num_exits|default:"0" }}</span>
    </li>
    <li>
      <span class="rv-stat-name">Objects</span>
      <span class="rv-stat-val">{{ num_others|default:"0" }}</span>
    </li>
  </ul>
</div>
