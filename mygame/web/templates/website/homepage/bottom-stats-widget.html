<!-- ============================================================
     Re:Void — Bottom Stats Bar
     Horizontal, combined, no duplicate fields.
     ============================================================ -->
<div class="rv-world-bar mb-4">
  <span class="rv-wbar-title">∴ The Void ∴</span>

  <span class="rv-wbar-item">
    <span class="rv-wbar-label">accounts</span>
    <span class="rv-wbar-val">{{ num_accounts_registered|default:"0" }}</span>
  </span>

  <span class="rv-wbar-sep">·</span>

  <span class="rv-wbar-item">
    <span class="rv-wbar-label">characters</span>
    <span class="rv-wbar-val">{{ num_characters|default:"0" }}</span>
  </span>

  <span class="rv-wbar-sep">·</span>

  <span class="rv-wbar-item">
    <span class="rv-wbar-label">rooms</span>
    <span class="rv-wbar-val">{{ num_rooms|default:"0" }}</span>
  </span>

  <span class="rv-wbar-sep">·</span>

  <span class="rv-wbar-item">
    <span class="rv-wbar-label">exits</span>
    <span class="rv-wbar-val">{{ num_exits|default:"0" }}</span>
  </span>

  <span class="rv-wbar-sep">·</span>

  <span class="rv-wbar-item">
    <span class="rv-wbar-label">objects</span>
    <span class="rv-wbar-val">{{ num_others|default:"0" }}</span>
  </span>
</div>
