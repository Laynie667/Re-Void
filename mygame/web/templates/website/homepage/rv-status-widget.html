<!-- ============================================================
     Re:Void — Server Status Widget
     Uses context variables provided by Evennia's default index view.
     ============================================================ -->
<div class="rv-stat-card">
  <h5>Server Status</h5>
  <ul>
    <li>
      <span class="rv-stat-name">Characters Created</span>
      <span class="rv-stat-val">{{ num_characters|default:"0" }}</span>
    </li>
    <li>
      <span class="rv-stat-name">Accounts Registered</span>
      <span class="rv-stat-val">{{ num_accounts_registered|default:"0" }}</span>
    </li>
    <li>
      <span class="rv-stat-name">Rooms</span>
      <span class="rv-stat-val">{{ num_rooms|default:"0" }}</span>
    </li>
    <li>
      <span class="rv-stat-name">Other Objects</span>
      <span class="rv-stat-val">{{ num_others|default:"0" }}</span>
    </li>
  </ul>
</div>
