<!-- ============================================================
     Re:Void — Hero / Header Banner
     Wisp figures are pure CSS shapes — no images required.
     ============================================================ -->
<div class="rv-hero mb-0">

  <!-- Wisp figures — left side -->
  <div class="rv-wisp-group rv-wisp-group-left" aria-hidden="true">
    <div class="rv-wisp rv-wisp-l1"></div>
    <div class="rv-wisp rv-wisp-l2"></div>
  </div>

  <!-- Wisp figures — right side -->
  <div class="rv-wisp-group rv-wisp-group-right" aria-hidden="true">
    <div class="rv-wisp rv-wisp-r1"></div>
    <div class="rv-wisp rv-wisp-r2"></div>
  </div>

  <!-- Sparkle canvas -->
  <div class="rv-sparkle-container" id="rv-sparkles" aria-hidden="true"></div>

  <!-- Hero copy -->
  <div class="rv-hero-content">
    <p class="rv-hero-eyebrow">Where the dead remember who they were</p>
    <h1 class="rv-hero-title">Re:Void</h1>
  </div>

</div>

<script>
(function () {
  var container = document.getElementById('rv-sparkles');
  if (!container) return;

  var COLORS = ['#c44dff', '#ff6ec7', '#9b2fff', '#f0e6ff', '#7c20d4'];
  var COUNT  = 22;

  for (var i = 0; i < COUNT; i++) {
    var s = document.createElement('div');
    s.className = 'rv-sparkle';

    var size  = (Math.random() * 9 + 3).toFixed(1) + 'px';
    var left  = (Math.random() * 88 + 6).toFixed(1) + '%';
    var top   = (Math.random() * 85 + 5).toFixed(1) + '%';
    var dur   = (Math.random() * 2.5 + 1.5).toFixed(2) + 's';
    var delay = (Math.random() * 4).toFixed(2) + 's';
    var color = COLORS[Math.floor(Math.random() * COLORS.length)];

    s.style.cssText = [
      'width:'   + size,
      'height:'  + size,
      'left:'    + left,
      'top:'     + top,
      '--dur:'   + dur,
      '--delay:' + delay,
      'background:' + color,
    ].join(';');

    container.appendChild(s);
  }
})();
</script>
