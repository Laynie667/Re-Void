<!-- ── Enter the Void ── -->
<div class="panel connect-section panel-connect">
  <div class="panel-title">Enter the Void</div>
  {% if webclient_enabled %}
  <a href="{% url 'webclient:index' %}" class="btn-enter-desk">
    <span class="online-dot"></span>
    Connect Now
  </a>
  {% else %}
  <div class="btn-enter-desk" style="opacity:0.4;cursor:default;pointer-events:none;">
    <span class="online-dot" style="animation:none;opacity:0.3;"></span>
    Connection Offline
  </div>
  {% endif %}
  <div class="server-address">revoid.game &nbsp;·&nbsp; web client</div>
</div>
